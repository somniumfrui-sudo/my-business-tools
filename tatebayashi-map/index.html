<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲食店お支払い方法マップ｜現金・カード・PayPay対応店舗を地図で検索</title>
  <meta name="description" content="全国の飲食店の支払い方法（現金・カード・PayPay・交通系IC等）がひと目でわかる地図アプリ。お店を探すときの参考に。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #faf6ef;
      --cream-d:  #f0e8d8;
      --terra:    #c4622d;
      --terra-l:  #e07848;
      --green:    #2d4a3e;
      --green-l:  #3d6b5a;
      --ink:      #1a1208;
      --muted:    #7a6a58;
      --white:    #ffffff;
      --shadow:   0 4px 24px rgba(26,18,8,.14);
      --shadow-lg:0 8px 40px rgba(26,18,8,.18);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Noto Sans JP", sans-serif;
      background: var(--green);
    }

    /* ── ヘッダー ─────────────────────────── */
    .app-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--white);
      border-bottom: 2px solid var(--green);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(45,74,62,.12);
    }
    .app-logo {
      font-family: "Kaisei Decol", serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--green);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .app-logo span { color: var(--terra); }

    .store-count {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── 地図 ─────────────────────────────── */
    #map {
      position: fixed;
      top: 52px;
      left: 0; right: 0; bottom: 0;
    }

    /* ── 店舗パネル ───────────────────────── */
    /* ── 絞り込みサイドパネル ── */
    .filter-panel {
      position: fixed;
      top: 52px;
      left: 0;
      width: 240px;
      height: calc(100vh - 52px);
      background: var(--white);
      border-right: 1px solid #e0e0e0;
      z-index: 850;
      overflow-y: auto;
      box-shadow: 2px 0 12px rgba(0,0,0,.08);
      padding: 0 0 40px;
    }
    .filter-panel::-webkit-scrollbar { width: 4px; }
    .filter-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .fp-section {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .fp-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* 支払い方法チェックボックス */
    .pay-check-list { display: flex; flex-direction: column; gap: 7px; }
    .pay-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--ink);
      cursor: pointer;
    }
    .pay-check-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--green);
      cursor: pointer;
      flex-shrink: 0;
    }
    .pay-check-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }

    /* ジャンルボタン */
    .genre-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .genre-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      padding: 7px 8px;
      border-radius: 8px;
      border: 1.5px solid #e0e0e0;
      background: var(--white);
      color: var(--ink);
      cursor: pointer;
      transition: all .13s;
      font-family: "Noto Sans JP", sans-serif;
    }
    .genre-btn:hover { border-color: var(--green); color: var(--green); }
    .genre-btn.active { background: var(--green); border-color: var(--green); color: var(--white); }
    .genre-btn-all {
      grid-column: 1 / -1;
      justify-content: center;
      background: var(--green);
      border-color: var(--green);
      color: var(--white);
    }

    /* リセットボタン */
    .fp-reset {
      display: block;
      width: calc(100% - 32px);
      margin: 12px 16px 0;
      padding: 9px;
      background: none;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: "Noto Sans JP", sans-serif;
      transition: all .13s;
    }
    .fp-reset:hover { border-color: var(--terra); color: var(--terra); }

    /* 地図をfilter-panelの幅だけずらす */
    #map {
      left: 240px !important;
    }
    .map-overlay-count {
      left: 252px !important;
    }

    .store-panel {
      position: fixed;
      top: 64px;
      left: 252px;
      width: 290px;
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      z-index: 900;
      overflow: hidden;
      transform: translateX(-360px);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
    }
    .store-panel.open { transform: translateX(0); }

    @media (max-width: 480px) {
      .store-panel {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
        max-height: 70vh;
        overflow-y: auto;
      }
      .store-panel.open { transform: translateY(0); }
    }

    /* パネルヘッダー */
    .panel-header {
      background: var(--green);
      padding: 16px 18px 14px;
      position: relative;
    }
    .panel-category {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: rgba(255,255,255,.55);
      text-transform: uppercase;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .panel-name {
      font-family: "Kaisei Decol", serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .panel-address {
      font-size: 11px;
      color: rgba(255,255,255,.5);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .panel-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,.12);
      border: none;
      color: rgba(255,255,255,.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background .15s;
    }
    .panel-close:hover { background: rgba(255,255,255,.22); }

    /* パネルボディ */
    .panel-body { padding: 16px 18px; }

    .panel-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* 支払い方法グリッド */
    .payment-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .payment-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      transition: transform .1s;
    }
    .payment-badge:hover { transform: scale(1.04); }
    .payment-badge .pay-icon { font-size: 22px; line-height: 1; }

    .pay-cash    { background: #f0fdf4; color: #166534; }
    .pay-card    { background: #eff6ff; color: #1e40af; }
    .pay-paypay  { background: #fff1f2; color: #be123c; }
    .pay-emoney  { background: #faf5ff; color: #6b21a8; }
    .pay-qr      { background: #fff7ed; color: #c2410c; }

    /* 備考 */
    .panel-note {
      background: var(--cream);
      border-left: 3px solid var(--terra);
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--ink);
      line-height: 1.7;
    }

    /* 営業時間・定休日 */
    .panel-info-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
    }
    .panel-info-row .info-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }

    /* ── カスタムマーカー ─────────────────── */
    .custom-marker {
      width: 36px;
      height: 42px;
      position: relative;
      cursor: pointer;
    }
    .marker-pin {
      width: 36px;
      height: 36px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.25);
      transition: transform .15s;
    }
    .marker-pin:hover { transform: rotate(-45deg) scale(1.15); }
    .marker-icon {
      transform: rotate(45deg);
      font-size: 16px;
      line-height: 1;
    }

    /* ── 凡例 ─────────────────────────────── */
    .legend {
      position: fixed;
      bottom: 24px;
      right: 12px;
      background: var(--white);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      z-index: 800;
      font-size: 11px;
    }
    .legend-title {
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      margin-bottom: 8px;
      font-size: 10px;
      text-transform: uppercase;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--ink);
      margin-bottom: 5px;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      flex-shrink: 0;
    }

    /* ── 件数バッジ ───────────────────────── */
    .map-overlay-count {
      position: fixed;
      bottom: 24px;
      left: 12px;
      background: var(--green);
      color: var(--cream);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      z-index: 800;
      box-shadow: var(--shadow);
    }
    .map-overlay-count span {
      font-size: 20px;
      font-family: "Kaisei Decol", serif;
      color: var(--terra-l);
      margin-right: 4px;
    }

    /* Leafletのデフォルトスタイル調整 */
    .leaflet-control-attribution { font-size: 10px !important; }
    .leaflet-popup { display: none !important; }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header class="app-header">
  <div class="app-logo">飲食店<span>お支払い方法マップ</span></div>

  <div class="store-count" id="store-count"></div>
</header>

<!-- 地図 -->
<div id="map"></div>

<!-- 絞り込みサイドパネル -->
<div class="filter-panel" id="filter-panel">
  <div class="fp-section">
    <div class="fp-title">💳 支払い方法</div>
    <div class="pay-check-list" id="pay-check-list">
      <label class="pay-check-item">
        <input type="checkbox" value="cash" onchange="applyFilters()">
        <span class="pay-check-badge pay-cash">💴 現金</span>
      </label>
      <label class="pay-check-item">
        <input type="checkbox" value="card" onchange="applyFilters()">
        <span class="pay-check-badge pay-card">💳 クレジットカード</span>
      </label>
      <label class="pay-check-item">
        <input type="checkbox" value="paypay" onchange="applyFilters()">
        <span class="pay-check-badge pay-paypay">🔴 PayPay</span>
      </label>
      <label class="pay-check-item">
        <input type="checkbox" value="qr" onchange="applyFilters()">
        <span class="pay-check-badge pay-qr">📱 QRコード決済</span>
      </label>
      <label class="pay-check-item">
        <input type="checkbox" value="emoney" onchange="applyFilters()">
        <span class="pay-check-badge pay-emoney">🚃 電子マネー</span>
      </label>
    </div>
  </div>

  <div class="fp-section">
    <div class="fp-title">🍽 ジャンル</div>
    <div class="genre-grid" id="genre-grid">
      <button class="genre-btn genre-btn-all active" onclick="setGenre('all', this)">すべてのジャンル</button>
    </div>
  </div>

  <button class="fp-reset" onclick="resetFilters()">↺ 絞り込みをリセット</button>
</div>

<!-- 店舗パネル -->
<div class="store-panel" id="store-panel">
  <div class="panel-header">
    <div class="panel-category" id="p-category"></div>
    <div class="panel-name" id="p-name"></div>
    <div class="panel-address" id="p-address"></div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="panel-section-label">💳 支払い方法</div>
    <div class="payment-grid" id="p-payments"></div>
    <div class="panel-section-label">📝 備考</div>
    <div class="panel-note" id="p-note"></div>
    <div class="panel-info-row" id="p-hours"></div>
    <div class="panel-info-row" id="p-closed"></div>
  </div>
</div>

<!-- 件数 -->
<div class="map-overlay-count">
  <span id="visible-count">0</span>件表示中
</div>

<!-- 凡例 -->
<div class="legend" id="legend">
  <div class="legend-title">ジャンル</div>
  <!-- JSで動的生成 -->
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* ════════════════════════════════════
   店舗データ
════════════════════════════════════ */
const GENRES = [
  { id: "japanese", label: "和食・定食",    icon: "🍣" },
  { id: "ramen",    label: "ラーメン・麺類", icon: "🍜" },
  { id: "fast",     label: "ファストフード", icon: "🍔" },
  { id: "asian",    label: "中華・アジアン", icon: "🥟" },
  { id: "cafe",     label: "カフェ・喫茶",  icon: "☕" },
  { id: "western",  label: "洋食・西洋",    icon: "🍝" },
  { id: "izakaya",  label: "居酒屋・バー",  icon: "🍷" },
  { id: "sweets",   label: "スイーツ",      icon: "🍰" },
  { id: "other",    label: "その他",        icon: "🍽️" },
];

const STORES = [
  {
    id: 1,
    name: "食堂 たてばやし",
    genreId: "japanese",
    lat: 36.2448,
    lng: 139.5392,
    address: "館林市本町2丁目",
    payments: [
      { id: "cash",  icon: "💴", label: "現金",              cls: "pay-cash" },
      { id: "card",  icon: "💳", label: "クレジットカード",    cls: "pay-card" },
      { id: "paypay",icon: "🔴", label: "PayPay",              cls: "pay-paypay" },
    ],
    note: "ランチタイムは現金のみの場合あり。1,000円以上でカード利用可。",
    hours: "11:00〜14:00 / 17:30〜21:00",
    closed: "日曜・祝日",
  },
  {
    id: 2,
    name: "らーめん 弐六家",
    genreId: "ramen",
    lat: 36.2432,
    lng: 139.5418,
    address: "館林市仲町",
    payments: [
      { id: "cash",   icon: "💴", label: "現金",              cls: "pay-cash" },
      { id: "paypay", icon: "🔴", label: "PayPay",              cls: "pay-paypay" },
      { id: "qr",     icon: "📱", label: "QRコード決済",         cls: "pay-qr" },
      { id: "emoney", icon: "🚃", label: "電子マネー",           cls: "pay-emoney" },
    ],
    note: "Suica・PASMOなど電子マネー対応。各種QRコード決済も使えます。",
    hours: "11:00〜15:00 / 18:00〜22:00",
    closed: "火曜日",
  },
  {
    id: 3,
    name: "喫茶 くすのき",
    genreId: "cafe",
    lat: 36.2461,
    lng: 139.5375,
    address: "館林市城町",
    payments: [
      { id: "cash",   icon: "💴", label: "現金",              cls: "pay-cash" },
    ],
    note: "現金のみ。ATMは駅前にあります。モーニングが人気のレトロ喫茶。",
    hours: "7:30〜18:00",
    closed: "月曜日・第3火曜日",
  },
  {
    id: 4,
    name: "ビストロ マルシェ",
    genreId: "western",
    lat: 36.2439,
    lng: 139.5403,
    address: "館林市楠町",
    payments: [
      { id: "cash",   icon: "💴", label: "現金",              cls: "pay-cash" },
      { id: "card",   icon: "💳", label: "クレジットカード",    cls: "pay-card" },
      { id: "paypay", icon: "🔴", label: "PayPay",              cls: "pay-paypay" },
      { id: "qr",     icon: "📱", label: "QRコード決済",         cls: "pay-qr" },
      { id: "emoney", icon: "🚃", label: "電子マネー",           cls: "pay-emoney" },
    ],
    note: "全主要キャッシュレス対応。ランチコースは要予約。",
    hours: "12:00〜14:30 / 18:00〜22:00",
    closed: "水曜日",
  },
  {
    id: 5,
    name: "うどん 麦の里",
    genreId: "japanese",
    lat: 36.2455,
    lng: 139.5430,
    address: "館林市緑町",
    payments: [
      { id: "cash",   icon: "💴", label: "現金",       cls: "pay-cash" },
      { id: "paypay", icon: "🔴", label: "PayPay",     cls: "pay-paypay" },
    ],
    note: "地元産小麦を使った手打ちうどん。テイクアウト可（現金のみ）。",
    hours: "11:00〜15:00（売り切れ次第終了）",
    closed: "月・火曜日",
  },
];

let activeFilter = 'all';
let markers = [];
let activeMarker = null;

/* ════════════════════════════════════
   地図初期化
════════════════════════════════════ */
const map = L.map('map', {
  center: [35.6812, 139.7671],
  zoom: 13,
  zoomControl: true,
});

L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>',
  maxZoom: 18,
}).addTo(map);

/* ════════════════════════════════════
   マーカー生成
════════════════════════════════════ */
function getGenre(store) {
  return GENRES.find(g => g.id === store.genreId) || GENRES[GENRES.length - 1];
}

function createMarkerIcon(store, isActive = false) {
  const genre = getGenre(store);
  const size = isActive ? 48 : 40;
  const bg = isActive ? '#c4622d' : '#2d4a3e';
  const html = `
    <div style="
      width:${size}px;height:${size}px;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      background:${bg};
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 12px rgba(0,0,0,.35);
      border:2px solid rgba(255,255,255,.9);
      transition:all .2s;
    ">
      <span style="transform:rotate(45deg);font-size:${isActive?20:16}px;line-height:1">${genre.icon}</span>
    </div>
  `;
  return L.divIcon({
    html,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size],
    popupAnchor: [0, -size],
  });
}

function renderMarkers() {
  // 既存マーカーを削除
  markers.forEach(({ marker }) => map.removeLayer(marker));
  markers = [];

  const filtered = STORES.filter(s => {
    // ジャンルフィルター
    if (selectedGenre !== 'all' && s.genreId !== selectedGenre) return false;
    // 支払いフィルター（チェックされたもの全部を含む店舗）
    if (selectedPayments.length > 0) {
      return selectedPayments.every(pid => s.payments.some(p => p.id === pid));
    }
    return true;
  });

  document.getElementById('visible-count').textContent = filtered.length;
  document.getElementById('store-count').textContent = `${filtered.length}件`;

  filtered.forEach(store => {
    const marker = L.marker([store.lat, store.lng], {
      icon: createMarkerIcon(store),
    }).addTo(map);

    marker.on('click', () => openPanel(store, marker));
    markers.push({ marker, store });
  });
}

/* ════════════════════════════════════
   パネル操作
════════════════════════════════════ */
function openPanel(store, marker) {
  // 前のアクティブマーカーをリセット
  if (activeMarker) {
    const prev = markers.find(m => m.marker === activeMarker);
    if (prev) prev.marker.setIcon(createMarkerIcon(prev.store, false));
  }

  // 新しいマーカーをアクティブに
  marker.setIcon(createMarkerIcon(store, true));
  activeMarker = marker;

  // パネルに情報を入れる
  const genre = getGenre(store);
  document.getElementById('p-category').innerHTML = `${genre.icon} ${genre.label}`;
  document.getElementById('p-name').textContent = store.name;
  document.getElementById('p-address').innerHTML = `📍 ${store.address}`;
  document.getElementById('p-note').textContent = store.note;
  document.getElementById('p-hours').innerHTML = `<span class="info-icon">🕐</span> 営業時間：${store.hours}`;
  document.getElementById('p-closed').innerHTML = `<span class="info-icon">🚫</span> 定休日：${store.closed}`;

  // 支払い方法グリッド
  document.getElementById('p-payments').innerHTML = store.payments.map(p => `
    <div class="payment-badge ${p.cls}">
      <span class="pay-icon">${p.icon}</span>
      ${p.label}
    </div>
  `).join('');

  // パネルを開く
  document.getElementById('store-panel').classList.add('open');

  // 地図を少し移動
  map.panTo([store.lat - 0.001, store.lng], { animate: true });
}

function closePanel() {
  document.getElementById('store-panel').classList.remove('open');
  if (activeMarker) {
    const prev = markers.find(m => m.marker === activeMarker);
    if (prev) prev.marker.setIcon(createMarkerIcon(prev.store, false));
    activeMarker = null;
  }
}

/* ════════════════════════════════════
   フィルター
════════════════════════════════════ */
let selectedPayments = []; // 選択中の支払い方法
let selectedGenre    = 'all'; // 選択中のジャンル

function applyFilters() {
  selectedPayments = Array.from(
    document.querySelectorAll('#pay-check-list input:checked')
  ).map(cb => cb.value);
  closePanel();
  renderMarkers();
}

function setGenre(genreId, btn) {
  selectedGenre = genreId;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  closePanel();
  renderMarkers();
}

function resetFilters() {
  selectedPayments = [];
  selectedGenre = 'all';
  document.querySelectorAll('#pay-check-list input').forEach(cb => cb.checked = false);
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.genre-btn-all').classList.add('active');
  closePanel();
  renderMarkers();
}

/* ════════════════════════════════════
   地図クリックでパネルを閉じる
════════════════════════════════════ */
map.on('click', () => closePanel());

/* ════════════════════════════════════
   初期化
════════════════════════════════════ */
window.addEventListener('load', function() {
  // ジャンルボタンを動的生成
  const genreGrid = document.getElementById('genre-grid');
  GENRES.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'genre-btn';
    btn.innerHTML = `${g.icon} ${g.label}`;
    btn.onclick = () => setGenre(g.id, btn);
    genreGrid.appendChild(btn);
  });

  // 凡例を動的生成
  const legend = document.getElementById('legend');
  GENRES.forEach(g => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span style="font-size:14px">${g.icon}</span>${g.label}`;
    legend.appendChild(item);
  });

  renderMarkers();
});
</script>
