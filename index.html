<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All AI Toolbox | 無料AIツール集</title>
  <meta name="description" content="100種類以上の楽しくて便利な無料AIツールを提供しています。">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: #ffffff;
      color: #111;
    }

    /* ── Header ── */
    .site-header {
      text-align: center;
      padding: 56px 24px 12px;
    }

    .site-header h1 {
      font-size: 36px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.02em;
    }

    .site-header p {
      margin-top: 12px;
      font-size: 15px;
      color: #666;
    }

    /* ── Divider ── */
    .divider {
      max-width: 960px;
      margin: 32px auto 0;
      border: none;
      border-top: 1px solid #e8eaed;
    }

    /* ── Grid ── */
    .grid {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .site-header h1 { font-size: 28px; }
    }

    /* ── Card ── */
    /*
     * 新しいカードの追加方法:
     *   1. tools/ 内に新フォルダを作成
     *   2. .grid の中に <a class="card"> を1つ追加するだけ
     */
    .card {
      display: flex;
      flex-direction: column;
      background: #f0f3f8;
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.10);
    }

    /* Preview area */
    .card-preview {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #dce5f5 0%, #c8d6ee 100%);
      font-size: 56px;
    }

    /* Text area */
    .card-body {
      padding: 16px 18px 20px;
      background: #ffffff;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a6ff4;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>All AI Toolbox</h1>
  <p>100種類以上の楽しくて便利な無料AIツールを提供しています。</p>
</header>

<hr class="divider">

<!-- =====================================================
     ★ ツールグリッド
     追加方法: .grid の中に <a class="card"> を1つ足すだけ
     ===================================================== -->
<div class="grid">

  <!-- カード 1 -->
  <a class="card" href="/tools/calc-sns/">
    <div class="card-preview">📊</div>
    <div class="card-body">
      <div class="card-title">SNS広告 損益分岐点シミュレーター</div>
      <div class="card-desc">広告費・原価・CVRを入力するだけで、黒字転換に必要な販売数を即計算します。</div>
    </div>
  </a>

  <!-- =====================================================
       次のカードをここに追加（テンプレート）

  <a class="card" href="/tools/YOUR-SLUG/">
    <div class="card-preview">🛠</div>
    <div class="card-body">
      <div class="card-title">ツール名</div>
      <div class="card-desc">説明文を2〜3文で。</div>
    </div>
  </a>

  ===================================================== -->

</div>

</body>
</html>
