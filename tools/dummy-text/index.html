<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダミーテキスト生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f8fa;
  --white:#fff;
  --border:#e4e8ef;
  --text:#111318;
  --muted:#6b7280;
  --light:#b0b7c3;
  --accent:#0057ff;
  --accent-l:rgba(0,87,255,.07);
  --green:#059669;
  --shadow:0 1px 3px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:44px 16px 100px;
}

.wrap{max-width:640px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:28px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-.02em;margin-bottom:4px;
}
.header p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── Settings card ── */
.settings-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:22px 20px;
  box-shadow:var(--shadow);margin-bottom:14px;
}
.card-label{
  font-size:10px;font-weight:500;letter-spacing:.12em;
  text-transform:uppercase;color:var(--light);margin-bottom:14px;
}

/* Source tabs */
.source-tabs{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;
}
.src-tab{
  display:flex;align-items:center;gap:6px;
  font-size:12px;padding:7px 13px;border-radius:9px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  transition:all .14s;
}
.src-tab .src-icon{font-size:15px}
.src-tab:hover{border-color:var(--accent);color:var(--text)}
.src-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

.divider{height:1px;background:var(--border);margin:14px 0}

/* Controls grid */
.controls-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;
}
@media(max-width:440px){.controls-grid{grid-template-columns:1fr}}

.ctrl-group label{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--muted);margin-bottom:6px;
}
.ctrl-group label .val{
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;
  color:var(--accent);
}

input[type=range]{
  width:100%;height:4px;border-radius:2px;appearance:none;-webkit-appearance:none;
  background:var(--border);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);border:2.5px solid var(--white);cursor:pointer;
  box-shadow:0 1px 4px rgba(0,87,255,.25);transition:transform .15s;
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}

/* Format toggles */
.format-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.fmt-btn{
  font-size:11px;padding:5px 12px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  transition:all .13s;
}
.fmt-btn:hover{border-color:var(--accent);color:var(--accent)}
.fmt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.btn-generate{
  width:100%;background:var(--text);color:#fff;border:none;
  border-radius:10px;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:700;padding:13px;cursor:pointer;
  transition:opacity .14s,transform .1s;
}
.btn-generate:hover{opacity:.88}
.btn-generate:active{transform:scale(.99)}

/* ── Output card ── */
.output-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md);
  margin-bottom:12px;
}
.output-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--bg);
}
.output-meta{
  font-size:11px;color:var(--muted);
  display:flex;gap:12px;
}
.output-meta span{display:flex;align-items:center;gap:4px}
.output-actions{display:flex;gap:6px}
.out-btn{
  font-size:11px;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:3px 8px;border-radius:5px;transition:color .13s,background .13s;
}
.out-btn:hover{color:var(--accent);background:var(--accent-l)}
.out-btn.done{color:var(--green)}

.output-area{
  padding:20px;
  font-size:14px;line-height:1.85;color:var(--text);
  min-height:160px;max-height:400px;overflow-y:auto;
  white-space:pre-wrap;word-break:break-all;
}
.output-area.serif{font-family:'Noto Serif JP',serif;font-weight:300}
.output-area.mono{font-family:'Courier New',monospace;font-size:13px}
.output-area .para+.para{margin-top:1em}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:160px;color:var(--light);font-size:13px;gap:8px;
}
.empty-state .empty-icon{font-size:32px;opacity:.4}

/* ── Copy bar ── */
.copy-bar{
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.copy-bar-txt{font-size:12px;color:var(--muted)}
.btn-copy-all{
  background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:700;padding:8px 18px;cursor:pointer;
  transition:opacity .13s,transform .1s;flex-shrink:0;
}
.btn-copy-all:hover{opacity:.9}
.btn-copy-all:active{transform:scale(.97)}
.btn-copy-all.done{background:var(--green)}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>📝 ダミーテキスト生成器</h1>
    <p>デザイン・開発で使うダミー文章を一瞬で生成。日本の名作文学も使えます。</p>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <div class="card-label">テキストの種類</div>

    <div class="source-tabs" id="source-tabs">
      <button class="src-tab active" onclick="setSrc('wagahai',this)">
        <span class="src-icon">🐱</span> 吾輩は猫である
      </button>
      <button class="src-tab" onclick="setSrc('kokoro',this)">
        <span class="src-icon">❤️</span> こころ
      </button>
      <button class="src-tab" onclick="setSrc('rashomon',this)">
        <span class="src-icon">⛩️</span> 羅生門
      </button>
      <button class="src-tab" onclick="setSrc('botchan',this)">
        <span class="src-icon">📚</span> 坊っちゃん
      </button>
      <button class="src-tab" onclick="setSrc('lorem',this)">
        <span class="src-icon">🌐</span> Lorem Ipsum
      </button>
      <button class="src-tab" onclick="setSrc('business',this)">
        <span class="src-icon">💼</span> ビジネス文
      </button>
      <button class="src-tab" onclick="setSrc('lorem_jp',this)">
        <span class="src-icon">🔤</span> 日本語ランダム
      </button>
    </div>

    <div class="divider"></div>

    <div class="controls-grid">
      <div class="ctrl-group">
        <label>段落数 <span class="val" id="para-val">3</span></label>
        <input type="range" id="para-range" min="1" max="20" value="3"
          oninput="document.getElementById('para-val').textContent=this.value">
      </div>
      <div class="ctrl-group">
        <label>1段落あたりの文数 <span class="val" id="sent-val">4</span></label>
        <input type="range" id="sent-range" min="1" max="12" value="4"
          oninput="document.getElementById('sent-val').textContent=this.value">
      </div>
    </div>

    <div class="card-label">表示フォント</div>
    <div class="format-row">
      <button class="fmt-btn active" onclick="setFont('sans',this)">ゴシック</button>
      <button class="fmt-btn" onclick="setFont('serif',this)">明朝体</button>
      <button class="fmt-btn" onclick="setFont('mono',this)">等幅</button>
    </div>

    <button class="btn-generate" onclick="generate()">⚡ 生成する</button>
  </div>

  <!-- Output -->
  <div class="output-card">
    <div class="output-head">
      <div class="output-meta">
        <span>📄 <span id="meta-paras">0</span>段落</span>
        <span>✍️ <span id="meta-chars">0</span>文字</span>
      </div>
      <div class="output-actions">
        <button class="out-btn" onclick="generate()">🔄 再生成</button>
        <button class="out-btn" id="btn-copy-pane" onclick="copyAll()">📋 コピー</button>
      </div>
    </div>
    <div class="output-area" id="output-area">
      <div class="empty-state">
        <span class="empty-icon">📝</span>
        「生成する」を押してください
      </div>
    </div>
  </div>

  <div class="copy-bar">
    <span class="copy-bar-txt" id="copy-meta">テキストを生成してコピー</span>
    <button class="btn-copy-all" id="btn-copy-all" onclick="copyAll()">📋 コピー</button>
  </div>

</div>

// ── State ──
let currentSrc  = 'wagahai';
let currentFont = 'sans';
let outputText  = '';

function setSrc(src, btn){
  currentSrc = src;
  document.querySelectorAll('.src-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function setFont(font, btn){
  currentFont = font;
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const area = document.getElementById('output-area');
  area.className = 'output-area' + (font==='serif'?' serif':font==='mono'?' mono':'');
}

// ── Generate ──
function generate(){
  const paras = parseInt(document.getElementById('para-range').value);
  const sents = parseInt(document.getElementById('sent-range').value);
  const src   = SOURCES[currentSrc];
  const pool  = [...src.sentences];

  // Shuffle pool
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }

  const paragraphs = [];
  let sIdx = 0;
  for(let p=0; p<paras; p++){
    const lines = [];
    for(let s=0; s<sents; s++){
      lines.push(pool[sIdx % pool.length]);
      sIdx++;
    }
    paragraphs.push(lines.join(currentSrc==='lorem' ? ' ' : ''));
  }

  outputText = paragraphs.join('\n\n');
  const totalChars = outputText.replace(/\n/g,'').length;

  // Render
  const area = document.getElementById('output-area');
  area.className = 'output-area' + (currentFont==='serif'?' serif':currentFont==='mono'?' mono':'');
  area.innerHTML = paragraphs.map(p=>`<div class="para">${escHtml(p)}</div>`).join('');

  // Meta
  document.getElementById('meta-paras').textContent = paras;
  document.getElementById('meta-chars').textContent = totalChars.toLocaleString();
  document.getElementById('copy-meta').textContent  = `${paras}段落 · ${totalChars.toLocaleString()}文字をコピー`;
}

// ── Copy ──
function copyAll(){
  if(!outputText){ alert('先にテキストを生成してください'); return; }
  navigator.clipboard.writeText(outputText).then(()=>{
    ['btn-copy-pane','btn-copy-all'].forEach(id=>{
      const btn = document.getElementById(id);
      const orig = btn.textContent;
      btn.textContent='✓ コピー済み';
      btn.classList.add('done');
      setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('done'); },1600);
    });
  });
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Auto-generate on load
generate();
