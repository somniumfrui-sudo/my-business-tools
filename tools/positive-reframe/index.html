<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>語彙力・言い換え辞典（ポジティブ変換）</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f8fa;
  --white:#fff;
  --border:#e4e8ef;
  --text:#111318;
  --muted:#374151;
  --light:#6b7280;
  --accent:#7c3aed;
  --accent-l:rgba(124,58,237,.07);
  --green:#059669;
  --green-l:rgba(5,150,105,.07);
  --shadow:0 1px 3px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:44px 16px 100px;
}

.wrap{max-width:640px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:28px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-.02em;margin-bottom:4px;
}
.header p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── Search card ── */
.search-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:20px;
  box-shadow:var(--shadow);margin-bottom:14px;
}

.search-row{display:flex;gap:8px;margin-bottom:12px}

.search-input{
  flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:400;
  padding:11px 14px;outline:none;
  transition:border-color .18s,box-shadow .18s,background .18s;
}
.search-input:focus{
  border-color:var(--accent);background:var(--white);
  box-shadow:0 0 0 3px var(--accent-l);
}
.search-input::placeholder{color:var(--light)}

.btn-search{
  background:var(--accent);color:#fff;border:none;
  border-radius:10px;font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:700;padding:11px 20px;cursor:pointer;
  white-space:nowrap;transition:opacity .14s,transform .1s;flex-shrink:0;
}
.btn-search:hover{opacity:.9}
.btn-search:active{transform:scale(.98)}

/* Category tabs */
.cat-row{display:flex;flex-wrap:wrap;gap:5px}
.cat-btn{
  font-size:11px;padding:4px 12px;border-radius:100px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;transition:all .13s;font-weight:500;
}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Result ── */
.result-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow-md);margin-bottom:14px;
  display:none;animation:fadeIn .3s ease;
}
.result-card.show{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.result-head{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.result-from{
  display:flex;align-items:center;gap:8px;
}
.from-badge{
  font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:500;
  color:var(--light);background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:4px 12px;text-decoration:line-through;
}
.arrow{font-size:18px;color:var(--light)}

.cat-badge{
  font-size:10px;font-weight:600;padding:3px 10px;border-radius:100px;
  letter-spacing:.06em;text-transform:uppercase;
}

/* Main positive word */
.result-main{
  padding:24px 20px 20px;text-align:center;
  background:linear-gradient(160deg,#faf5ff,#f5f0ff);
}
.result-positive{
  font-family:'Outfit',sans-serif;font-size:clamp(28px,8vw,48px);
  font-weight:800;letter-spacing:-.02em;
  color:var(--accent);line-height:1;margin-bottom:10px;
  animation:popIn .35s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

.result-desc{
  font-size:13px;color:var(--muted);line-height:1.75;
  max-width:440px;margin:0 auto;
}

/* Alt words */
.alts{
  padding:14px 20px;border-top:1px solid var(--border);
}
.alts-label{
  font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--light);margin-bottom:10px;
}
.alt-chips{display:flex;flex-wrap:wrap;gap:6px}
.alt-chip{
  font-size:13px;font-weight:500;padding:5px 14px;border-radius:100px;
  border:1.5px solid rgba(124,58,237,.2);background:var(--accent-l);
  color:var(--accent);cursor:pointer;transition:all .13s;
}
.alt-chip:hover{background:var(--accent);color:#fff}

/* Usage */
.usage{
  padding:14px 20px;border-top:1px solid var(--border);
  background:var(--bg);
}
.usage-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--light);margin-bottom:8px}
.usage-examples{display:flex;flex-direction:column;gap:6px}
.usage-ex{
  font-size:13px;color:var(--muted);
  padding:8px 12px;background:var(--white);border-radius:8px;
  border-left:3px solid var(--accent);line-height:1.6;
}
.usage-ex strong{color:var(--accent);font-weight:600}

/* ── Keyword grid ── */
.grid-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;box-shadow:var(--shadow);
}
.grid-head{
  padding:12px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.grid-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--light)}
.grid-count{font-size:11px;color:var(--light)}

.kw-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
}
@media(max-width:420px){.kw-grid{grid-template-columns:1fr}}

.kw-item{
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .13s;
}
.kw-item:nth-child(odd){border-right:1px solid var(--border)}
.kw-item:hover{background:#faf5ff}
.kw-item:last-child:nth-child(odd){border-right:none}
/* remove bottom border from last two */

.kw-neg{
  flex:1;padding:10px 14px;
  font-size:12px;color:var(--light);
  text-decoration:line-through;text-decoration-color:var(--border);
  border-right:1px solid var(--border);
  line-height:1.4;
}
.kw-pos{
  flex:1;padding:10px 14px;
  font-size:13px;color:var(--text);font-weight:500;
  line-height:1.4;
}
.kw-arrow{font-size:10px;color:var(--border);flex-shrink:0;padding:0 2px}

/* ── Copy bar ── */
.copy-bar{
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;
  box-shadow:var(--shadow);margin-top:14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.copy-bar-txt{font-size:12px;color:var(--muted)}
.btn-copy{
  background:var(--accent);color:#fff;border:none;
  border-radius:8px;font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:700;padding:8px 18px;cursor:pointer;
  transition:opacity .13s;flex-shrink:0;
}
.btn-copy:hover{opacity:.9}
.btn-copy.done{background:var(--green)}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>💎 ポジティブ変換辞典</h1>
    <p>ネガティブな言葉を「強み」として言い換えるリフレーミングツール。<br>短所は長所。見方を変えるだけで、まるで別の言葉になります。</p>
  </div>

  <!-- Search -->
  <div class="search-card">
    <div class="search-row">
      <input type="text" class="search-input" id="search-input"
        placeholder="短所・ネガティブな言葉を入力（例：飽きっぽい）"
        oninput="liveSearch()" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-search" onclick="doSearch()">🔄 変換</button>
    </div>
    <div class="cat-row" id="cat-row">
      <button class="cat-btn active" onclick="setCat('all',this)">すべて</button>
      <button class="cat-btn" onclick="setCat('性格',this)">🧠 性格</button>
      <button class="cat-btn" onclick="setCat('仕事',this)">💼 仕事</button>
      <button class="cat-btn" onclick="setCat('人間関係',this)">🤝 人間関係</button>
      <button class="cat-btn" onclick="setCat('感情',this)">💭 感情</button>
      <button class="cat-btn" onclick="setCat('行動',this)">🏃 行動</button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="result-card">
    <div class="result-head">
      <div class="result-from">
        <span class="from-badge" id="r-from">—</span>
        <span class="arrow">→</span>
      </div>
      <span class="cat-badge" id="r-cat-badge">—</span>
    </div>
    <div class="result-main">
      <div class="result-positive" id="r-positive">—</div>
      <div class="result-desc" id="r-desc">—</div>
    </div>
    <div class="alts">
      <div class="alts-label">他の言い換え</div>
      <div class="alt-chips" id="r-alts"></div>
    </div>
    <div class="usage">
      <div class="usage-label">使い方の例</div>
      <div class="usage-examples" id="r-usage"></div>
    </div>
  </div>

  <!-- Copy bar -->
  <div class="copy-bar" id="copy-bar" style="display:none">
    <span class="copy-bar-txt" id="copy-txt">—</span>
    <button class="btn-copy" id="btn-copy" onclick="copyResult()">📋 コピー</button>
  </div>

  <!-- Keyword grid -->
  <div class="grid-card" id="kw-grid-card">
    <div class="grid-head">
      <span class="grid-title">言い換えリスト一覧</span>
      <span class="grid-count" id="grid-count"></span>
    </div>
    <div class="kw-grid" id="kw-grid"></div>
  </div>

</div>

   desc:'物事を多角的に掘り下げ、本質を見抜く力。表面に見えない問題の根因を発見できる。',
   alts:['深く考えられる','論理的思考','問題解決力が高い'],
   usage:['<strong>分析力が高く</strong>、複雑な問題の本質を見抜いて解決策を提案します。']},

  {neg:'飽きずに同じことを繰り返す', pos:'継続力・忍耐力がある', cat:'行動', color:'#059669',
   desc:'コツコツと積み上げる力。短期的な成果より長期的な価値を生み出す根気強さ。',
   alts:['粘り強い','やり抜く力がある','継続できる'],
   usage:['<strong>継続力があり</strong>、長期のプロジェクトでもモチベーションを維持します。']},

  {neg:'衝動的',       pos:'直感力がある',         cat:'行動', color:'#f59e0b',
   desc:'論理より先に本質を感じ取れる直感。経験と感性から素早く正しい判断を下す力。',
   alts:['判断が速い','感性が鋭い','直感が働く'],
   usage:['<strong>直感力が高く</strong>、流れを読んで素早い判断ができます。']},
];

// ══════════════════════════════════════════════
let currentCat = 'all';
let currentResult = null;

function setCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
  liveSearch();
}

// ── Search ──
function liveSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(q.length < 1){ hideResult(); return; }
  doSearch();
}

function doSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(!q){ hideResult(); return; }

  // Find best match
  const filtered = currentCat === 'all' ? DICT : DICT.filter(d=>d.cat===currentCat);
  let match = filtered.find(d => d.neg === q);
  if(!match) match = filtered.find(d => d.neg.includes(q) || q.includes(d.neg.slice(0,3)));
  if(!match) match = filtered.find(d =>
    d.pos.includes(q) || d.alts.some(a=>a.includes(q))
  );

  if(match) showResult(match);
  else showNoResult(q);
}

function showResult(item){
  currentResult = item;
  document.getElementById('r-from').textContent    = item.neg;
  document.getElementById('r-positive').textContent= item.pos;
  document.getElementById('r-desc').textContent    = item.desc;

  const badge = document.getElementById('r-cat-badge');
  badge.textContent = item.cat;
  badge.style.background = item.color + '15';
  badge.style.color       = item.color;
  badge.style.border      = '1px solid ' + item.color + '40';

  document.getElementById('r-positive').style.color = item.color;

  document.getElementById('r-alts').innerHTML = item.alts.map(a=>
    `<span class="alt-chip" style="color:${item.color};border-color:${item.color}40;background:${item.color}0e"
      onclick="document.getElementById('search-input').value='${escAttr(a)}';doSearch()">${a}</span>`
  ).join('');

  document.getElementById('r-usage').innerHTML = item.usage.map(u=>
    `<div class="usage-ex">${u}</div>`
  ).join('');

  const card = document.getElementById('result-card');
  card.classList.remove('show');
  void card.offsetWidth;
  card.classList.add('show');

  // Retrigger pop animation
  const pos = document.getElementById('r-positive');
  pos.style.animation='none'; void pos.offsetWidth; pos.style.animation='';

  // Copy bar
  document.getElementById('copy-txt').textContent = `「${item.neg}」→「${item.pos}」`;
  document.getElementById('copy-bar').style.display='flex';
}

function showNoResult(q){
  // Show generic reframe
  const generic = {
    neg: q,
    pos: `${q}という個性`,
    color: '#7c3aed',
    cat: '性格',
    desc: `「${q}」と感じていることも、見方を変えれば個性の一つです。その特性が活きる場面や使い方を探してみましょう。`,
    alts: ['個性的','ユニーク','自分らしい'],
    usage: [
      `<strong>「${q}」という特性</strong>は、適切な場面で活かせば大きな強みになります。`,
      `その個性が<strong>一番輝く場所</strong>を見つけることが大切です。`,
    ]
  };
  showResult(generic);
}

function hideResult(){
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('copy-bar').style.display='none';
}

// ── Grid ──
function renderGrid(){
  const items = currentCat === 'all' ? DICT : DICT.filter(d=>d.cat===currentCat);
  document.getElementById('grid-count').textContent = items.length + '件';
  document.getElementById('kw-grid').innerHTML = items.map(item=>`
    <div class="kw-item" onclick="selectWord('${escAttr(item.neg)}')">
      <div class="kw-neg">${escHtml(item.neg)}</div>
      <div class="kw-arrow">→</div>
      <div class="kw-pos" style="color:${item.color}">${escHtml(item.pos)}</div>
    </div>`).join('');
}

function selectWord(neg){
  document.getElementById('search-input').value = neg;
  doSearch();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Copy ──
function copyResult(){
  if(!currentResult) return;
  const text = `【ポジティブ変換】\n「${currentResult.neg}」→「${currentResult.pos}」\n${currentResult.desc}`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('btn-copy');
    btn.textContent='✓ コピー済み';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='📋 コピー';btn.classList.remove('done');},1600);
  });
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escAttr(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;') }

// Init
renderGrid();
</script>
</body>
</html>
