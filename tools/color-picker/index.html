<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カラーピッカー & 変換</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f8fa;
  --white:#ffffff;
  --border:#e4e8ef;
  --text:#111318;
  --muted:#6b7280;
  --light:#b0b7c3;
  --accent:#0057ff;
  --shadow:0 1px 3px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:44px 16px 100px;
  transition:background .3s;
}

.wrap{max-width:480px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:28px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-.02em;margin-bottom:4px;
}
.header p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── Picker card ── */
.picker-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:20px;overflow:hidden;
  box-shadow:var(--shadow-md);margin-bottom:14px;
}

/* Color preview */
.color-preview{
  height:160px;
  display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;
  transition:background .1s;
}

.color-preview-label{
  font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;
  letter-spacing:.04em;
  mix-blend-mode:difference;filter:invert(1);
  opacity:.7;user-select:none;pointer-events:none;
}

/* Hidden native color input — covers entire preview */
.color-preview input[type=color]{
  position:absolute;inset:0;width:100%;height:100%;
  opacity:0;cursor:pointer;border:none;padding:0;
}

.picker-body{padding:20px}

/* Color input row */
.hex-row{
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
}
.hex-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);min-width:38px}
.hex-input{
  flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;
  padding:9px 12px;outline:none;
  transition:border-color .18s,box-shadow .18s;
  letter-spacing:.04em;
}
.hex-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,87,255,.09)}

.btn-big-copy{
  background:var(--accent);color:#fff;border:none;border-radius:9px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  padding:9px 14px;cursor:pointer;flex-shrink:0;
  transition:opacity .15s,transform .1s;
}
.btn-big-copy:hover{opacity:.9}
.btn-big-copy:active{transform:scale(.97)}
.btn-big-copy.done{background:var(--green,#059669)}

/* ── Code blocks ── */
.codes{display:flex;flex-direction:column;gap:8px}

.code-row{
  display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 14px;
  transition:border-color .18s;
}
.code-row:hover{border-color:var(--light)}

.code-type{
  font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  min-width:34px;color:var(--light);
}
.code-val{
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:400;
  color:var(--text);flex:1;letter-spacing:.02em;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}
.btn-copy{
  background:none;border:none;color:var(--light);
  cursor:pointer;font-size:14px;padding:3px 6px;border-radius:5px;
  transition:color .14s,background .14s;flex-shrink:0;
}
.btn-copy:hover{color:var(--accent);background:rgba(0,87,255,.08)}
.btn-copy.done{color:#059669}

/* ── Sliders ── */
.sliders-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;
  box-shadow:var(--shadow);margin-bottom:14px;
}
.sliders-label{
  font-size:10px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;color:var(--light);margin-bottom:14px;
}
.slider-group{margin-bottom:10px}
.slider-group:last-child{margin-bottom:0}

.slider-row{display:flex;align-items:center;gap:10px}
.slider-name{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--muted);min-width:14px;
}
.slider-track{
  flex:1;height:8px;border-radius:4px;position:relative;cursor:pointer;
}
input[type=range].rgb-slider{
  width:100%;height:8px;border-radius:4px;
  appearance:none;-webkit-appearance:none;
  outline:none;cursor:pointer;background:transparent;
}
input[type=range].rgb-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:#fff;border:2px solid rgba(0,0,0,.2);cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .15s;
}
input[type=range].rgb-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.slider-val{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  color:var(--text);min-width:30px;text-align:right;
}

/* ── Palette ── */
.palette-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:18px 20px;
  box-shadow:var(--shadow);margin-bottom:14px;
}
.palette-title{
  font-size:10px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;color:var(--light);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.btn-gen{
  font-size:11px;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:2px 6px;border-radius:5px;
  transition:color .14s;
}
.btn-gen:hover{color:var(--accent)}

.swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatch{
  width:40px;height:40px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;
  position:relative;flex-shrink:0;
}
.swatch:hover{transform:scale(1.1)}
.swatch.current{border-color:var(--text) !important;transform:scale(1.12)}
.swatch-tip{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);
  white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;
}
.swatch:hover .swatch-tip{opacity:1}

/* ── History ── */
.history-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
  box-shadow:var(--shadow);
}
.history-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.history-title{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--light)}
.btn-clear{font-size:11px;color:var(--light);background:none;border:none;cursor:pointer;transition:color .14s}
.btn-clear:hover{color:var(--accent)}

.history-swatches{display:flex;gap:6px;flex-wrap:wrap}
.history-swatch{
  width:32px;height:32px;border-radius:6px;cursor:pointer;
  border:1.5px solid rgba(0,0,0,.08);
  transition:transform .15s;flex-shrink:0;
}
.history-swatch:hover{transform:scale(1.15)}
.history-empty{font-size:12px;color:var(--light)}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>🎨 カラーピッカー & 変換</h1>
    <p>色を選ぶだけで HEX・RGB・HSL を即コピー。デザイン・開発の作業を爆速化。</p>
  </div>

  <!-- Picker -->
  <div class="picker-card">
    <div class="color-preview" id="preview" style="background:#0057ff">
      <span class="color-preview-label" id="preview-label">#0057FF</span>
      <input type="color" id="color-input" value="#0057ff" oninput="onColorInput(this.value)">
    </div>

    <div class="picker-body">
      <div class="hex-row">
        <span class="hex-label">HEX</span>
        <input class="hex-input" id="hex-text" value="#0057ff" maxlength="7"
          oninput="onHexText(this.value)" spellcheck="false" autocomplete="off">
        <button class="btn-big-copy" id="btn-hex-copy" onclick="copyCode('hex')">コピー</button>
      </div>

      <div class="codes">
        <div class="code-row">
          <span class="code-type">RGB</span>
          <span class="code-val" id="code-rgb">rgb(0, 87, 255)</span>
          <button class="btn-copy" onclick="copyCode('rgb')" title="コピー">📋</button>
        </div>
        <div class="code-row">
          <span class="code-type">HSL</span>
          <span class="code-val" id="code-hsl">hsl(222, 100%, 50%)</span>
          <button class="btn-copy" onclick="copyCode('hsl')" title="コピー">📋</button>
        </div>
        <div class="code-row">
          <span class="code-type">CSS</span>
          <span class="code-val" id="code-css">color: #0057ff;</span>
          <button class="btn-copy" onclick="copyCode('css')" title="コピー">📋</button>
        </div>
        <div class="code-row">
          <span class="code-type">BG</span>
          <span class="code-val" id="code-bg">background-color: #0057ff;</span>
          <button class="btn-copy" onclick="copyCode('bg')" title="コピー">📋</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RGB sliders -->
  <div class="sliders-card">
    <div class="sliders-label">RGB スライダー</div>
    <div class="slider-group">
      <div class="slider-row">
        <span class="slider-name">R</span>
        <div class="slider-track">
          <input type="range" class="rgb-slider" id="sl-r" min="0" max="255" value="0"
            style="background:linear-gradient(to right,#000,#ff0000)"
            oninput="onSlider()">
        </div>
        <span class="slider-val" id="sv-r">0</span>
      </div>
    </div>
    <div class="slider-group">
      <div class="slider-row">
        <span class="slider-name">G</span>
        <div class="slider-track">
          <input type="range" class="rgb-slider" id="sl-g" min="0" max="255" value="87"
            style="background:linear-gradient(to right,#000,#00ff00)"
            oninput="onSlider()">
        </div>
        <span class="slider-val" id="sv-g">87</span>
      </div>
    </div>
    <div class="slider-group">
      <div class="slider-row">
        <span class="slider-name">B</span>
        <div class="slider-track">
          <input type="range" class="rgb-slider" id="sl-b" min="0" max="255" value="255"
            style="background:linear-gradient(to right,#000,#0000ff)"
            oninput="onSlider()">
        </div>
        <span class="slider-val" id="sv-b">255</span>
      </div>
    </div>
  </div>

  <!-- Palette -->
  <div class="palette-card">
    <div class="palette-title">
      <span>バリエーションパレット</span>
      <button class="btn-gen" onclick="genPalette()">🔄 再生成</button>
    </div>
    <div class="swatches" id="swatches"></div>
  </div>

  <!-- History -->
  <div class="history-card">
    <div class="history-header">
      <span class="history-title">使用した色の履歴</span>
      <button class="btn-clear" onclick="clearHistory()">クリア</button>
    </div>
    <div class="history-swatches" id="history-swatches">
      <span class="history-empty">まだ色を選んでいません</span>
    </div>
  </div>

</div>

<script>
let currentHex = '#0057ff';
let history    = JSON.parse(localStorage.getItem('colorpicker-hist')||'[]');

// ── Conversions ──
function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function rgbToHex(r,g,b){
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function rgbToHsl(r,g,b){
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

function hslToRgb(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return {r:Math.round(f(0)*255),g:Math.round(f(8)*255),b:Math.round(f(4)*255)};
}

// ── Update all UI from hex ──
function updateAll(hex, saveHistory=true){
  currentHex = hex.toLowerCase();
  if(!/^#[0-9a-f]{6}$/.test(currentHex)) return;

  const {r,g,b} = hexToRgb(currentHex);
  const {h,s,l} = rgbToHsl(r,g,b);

  // Preview
  document.getElementById('preview').style.background = currentHex;
  document.getElementById('preview-label').textContent = currentHex.toUpperCase();
  document.getElementById('color-input').value = currentHex;

  // Hex text
  document.getElementById('hex-text').value = currentHex;

  // Codes
  document.getElementById('code-rgb').textContent = `rgb(${r}, ${g}, ${b})`;
  document.getElementById('code-hsl').textContent = `hsl(${h}, ${s}%, ${l}%)`;
  document.getElementById('code-css').textContent = `color: ${currentHex};`;
  document.getElementById('code-bg').textContent  = `background-color: ${currentHex};`;

  // Sliders
  document.getElementById('sl-r').value = r;
  document.getElementById('sl-g').value = g;
  document.getElementById('sl-b').value = b;
  document.getElementById('sv-r').textContent = r;
  document.getElementById('sv-g').textContent = g;
  document.getElementById('sv-b').textContent = b;

  // Slider track gradients
  document.getElementById('sl-r').style.background = `linear-gradient(to right,rgb(0,${g},${b}),rgb(255,${g},${b}))`;
  document.getElementById('sl-g').style.background = `linear-gradient(to right,rgb(${r},0,${b}),rgb(${r},255,${b}))`;
  document.getElementById('sl-b').style.background = `linear-gradient(to right,rgb(${r},${g},0),rgb(${r},${g},255))`;

  genPalette();

  if(saveHistory) addHistory(currentHex);
}

// ── Input handlers ──
function onColorInput(val){
  updateAll(val);
}

function onHexText(val){
  val = val.trim();
  if(!val.startsWith('#')) val = '#' + val;
  if(/^#[0-9a-fA-F]{6}$/.test(val)) updateAll(val.toLowerCase(), false);
}

function onSlider(){
  const r = parseInt(document.getElementById('sl-r').value);
  const g = parseInt(document.getElementById('sl-g').value);
  const b = parseInt(document.getElementById('sl-b').value);
  document.getElementById('sv-r').textContent = r;
  document.getElementById('sv-g').textContent = g;
  document.getElementById('sv-b').textContent = b;
  updateAll(rgbToHex(r,g,b));
}

// ── Copy ──
function copyCode(type){
  const map = {
    hex: currentHex,
    rgb: document.getElementById('code-rgb').textContent,
    hsl: document.getElementById('code-hsl').textContent,
    css: document.getElementById('code-css').textContent,
    bg:  document.getElementById('code-bg').textContent,
  };
  const text = map[type] || currentHex;
  navigator.clipboard.writeText(text).then(()=>{
    if(type === 'hex'){
      const btn = document.getElementById('btn-hex-copy');
      btn.textContent = '✓ コピー';
      btn.classList.add('done');
      setTimeout(()=>{ btn.textContent='コピー'; btn.classList.remove('done'); }, 1500);
    } else {
      // flash the row button
      const btns = document.querySelectorAll('.btn-copy');
      const labels = {rgb:0,hsl:1,css:2,bg:3};
      const btn = btns[labels[type]];
      if(btn){ btn.textContent='✓'; btn.classList.add('done'); setTimeout(()=>{ btn.textContent='📋'; btn.classList.remove('done'); },1400); }
    }
  });
}

// ── Palette ──
function genPalette(){
  const {h,s,l} = rgbToHsl(...Object.values(hexToRgb(currentHex)));

  const variants = [
    // Tints (lighter)
    {h,s,l:Math.min(l+40,95)},
    {h,s,l:Math.min(l+25,90)},
    {h,s,l:Math.min(l+12,80)},
    // Current (approx)
    {h,s,l},
    // Shades (darker)
    {h,s,l:Math.max(l-12,10)},
    {h,s,l:Math.max(l-25,5)},
    {h,s,l:Math.max(l-40,3)},
    // Complementary
    {h:(h+180)%360,s,l},
    // Analogous
    {h:(h+30)%360,s,l},
    {h:(h+330)%360,s,l},
  ];

  const el = document.getElementById('swatches');
  el.innerHTML = variants.map(v=>{
    const {r,g,b} = hslToRgb(v.h,v.s,v.l);
    const hex = rgbToHex(r,g,b);
    const isCur = hex === currentHex;
    return `<div class="swatch ${isCur?'current':''}"
      style="background:${hex};border-color:${isCur?'rgba(0,0,0,.4)':'rgba(0,0,0,.08)'}"
      onclick="updateAll('${hex}')"
      title="${hex}">
      <span class="swatch-tip">${hex}</span>
    </div>`;
  }).join('');
}

// ── History ──
function addHistory(hex){
  if(history[0] === hex) return;
  history = [hex, ...history.filter(h=>h!==hex)].slice(0,20);
  localStorage.setItem('colorpicker-hist', JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const el = document.getElementById('history-swatches');
  if(history.length === 0){
    el.innerHTML = '<span class="history-empty">まだ色を選んでいません</span>'; return;
  }
  el.innerHTML = history.map(h=>`
    <div class="history-swatch"
      style="background:${h}"
      onclick="updateAll('${h}')"
      title="${h}"></div>`).join('');
}

function clearHistory(){
  history = [];
  localStorage.setItem('colorpicker-hist','[]');
  renderHistory();
}

// Init
renderHistory();
updateAll(currentHex, false);
</script>
</body>
</html>
