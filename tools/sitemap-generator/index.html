<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown サイトマップ生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2333;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --light:#484f58;
  --accent:#58a6ff;
  --accent-l:rgba(88,166,255,.09);
  --green:#3fb950;
  --green-l:rgba(63,185,80,.09);
  --purple:#bc8cff;
  --purple-l:rgba(188,140,255,.08);
  --orange:#ffa657;
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:36px 16px 100px;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(88,166,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(88,166,255,.015) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:1040px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:22px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-.02em;margin-bottom:4px;color:var(--text);
}
.header h1 span{color:var(--accent)}
.header p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
@media(max-width:700px){.layout{grid-template-columns:1fr}}

/* ── Card base ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md);
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--surface2);flex-wrap:wrap;gap:6px;
}
.card-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.card-acts{display:flex;gap:4px}
.c-btn{
  font-size:11px;font-weight:500;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:2px 8px;border-radius:5px;
  transition:color .12s,background .12s;
}
.c-btn:hover{color:var(--text);background:rgba(255,255,255,.07)}
.c-btn.done{color:var(--green)}

/* ── Input pane ── */
.input-pane{padding:14px}

.site-info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.field label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;letter-spacing:.04em}
.field input{
  width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
  padding:8px 11px;outline:none;
  transition:border-color .15s,background .15s;
}
.field input:focus{border-color:var(--accent);background:rgba(88,166,255,.04)}
.field input::placeholder{color:var(--light)}

/* Page list */
.page-list-label{
  font-size:11px;font-weight:600;color:var(--muted);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
  letter-spacing:.06em;text-transform:uppercase;
}
.page-list-label .hint{font-size:10px;color:var(--light);font-weight:400;letter-spacing:0;text-transform:none}

.page-rows{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}

.page-row{
  display:flex;gap:6px;align-items:center;
  animation:rowIn .2s ease both;
}
@keyframes rowIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:translateX(0)}}

.indent-btn{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:6px;width:28px;height:28px;flex-shrink:0;
  color:var(--muted);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
}
.indent-btn:hover{border-color:var(--accent);color:var(--accent)}

.indent-display{
  width:20px;font-size:11px;color:var(--light);
  font-family:'JetBrains Mono',monospace;text-align:center;flex-shrink:0;
}

.page-name-input{
  flex:2;background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:7px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:12px;
  padding:6px 9px;outline:none;
  transition:border-color .15s;
}
.page-name-input:focus{border-color:var(--accent)}
.page-name-input::placeholder{color:var(--light)}

.page-url-input{
  flex:3;background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:7px;color:var(--accent);
  font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:6px 9px;outline:none;
  transition:border-color .15s;
}
.page-url-input:focus{border-color:var(--accent)}
.page-url-input::placeholder{color:var(--light);font-family:'Noto Sans JP',sans-serif;font-size:11px}

.page-desc-input{
  flex:2;background:rgba(255,255,255,.04);border:1.5px solid var(--border);
  border-radius:7px;color:var(--muted);
  font-family:'Noto Sans JP',sans-serif;font-size:11px;
  padding:6px 9px;outline:none;
  transition:border-color .15s;display:none;
}
.page-desc-input.show{display:block}
.page-desc-input:focus{border-color:var(--purple)}

.del-row-btn{
  background:none;border:none;cursor:pointer;
  color:var(--light);font-size:15px;padding:3px 4px;
  border-radius:4px;flex-shrink:0;transition:color .12s;
}
.del-row-btn:hover{color:var(--red,#ff7b72)}

/* Add row button */
.btn-add-row{
  width:100%;background:rgba(255,255,255,.03);border:1.5px dashed var(--border);
  border-radius:8px;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  padding:8px;cursor:pointer;transition:all .14s;
  display:flex;align-items:center;justify-content:center;gap:5px;
  margin-bottom:12px;
}
.btn-add-row:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}

/* Options row */
.options-row{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;
}
.opt-chip{
  display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
  color:var(--muted);padding:4px 11px;border-radius:7px;
  border:1.5px solid var(--border);background:rgba(255,255,255,.03);
  cursor:pointer;transition:all .13s;user-select:none;
}
.opt-chip:hover{border-color:var(--text);color:var(--text)}
.opt-chip.on{background:var(--accent-l);border-color:rgba(88,166,255,.3);color:var(--accent)}

/* Format select */
.format-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.fmt-btn{
  flex:1;font-size:11px;font-weight:600;padding:6px 8px;border-radius:7px;
  border:1.5px solid var(--border);background:rgba(255,255,255,.03);
  color:var(--muted);cursor:pointer;transition:all .13s;text-align:center;
}
.fmt-btn:hover{border-color:var(--text);color:var(--text)}
.fmt-btn.active{background:rgba(255,255,255,.08);border-color:var(--muted);color:var(--text)}

/* Generate button */
.btn-gen{
  width:100%;background:var(--accent);color:#000;border:none;
  border-radius:10px;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:800;padding:13px;cursor:pointer;
  transition:opacity .13s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  letter-spacing:.02em;
}
.btn-gen:hover{opacity:.9}
.btn-gen:active{transform:scale(.99)}

/* ── Output pane ── */
.output-pane{
  display:flex;flex-direction:column;min-height:480px;
}
.md-output{
  flex:1;padding:16px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  line-height:1.75;color:var(--muted);
  overflow-y:auto;min-height:340px;white-space:pre-wrap;word-break:break-all;
  background:var(--surface);
}
.md-output.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--light);font-size:13px;gap:8px;
  font-family:'Noto Sans JP',sans-serif;
}
.md-empty-icon{font-size:32px;opacity:.25}

/* Syntax highlighting */
.md-h1{color:var(--text)}
.md-h2{color:var(--accent)}
.md-h3{color:var(--purple)}
.md-bullet{color:var(--green)}
.md-url{color:var(--accent);opacity:.7}
.md-label{color:var(--orange)}
.md-comment{color:var(--light);font-style:italic}

/* Tab bar */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface2)}
.tab{
  font-size:11px;font-weight:600;padding:8px 14px;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;transition:all .13s;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Preview tab */
.preview-tab{
  padding:16px;font-size:13px;line-height:1.8;
  color:var(--text);min-height:340px;display:none;overflow-y:auto;
}
.preview-tab.show{display:block}
.preview-tab h1{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.preview-tab h2{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:var(--accent);margin:14px 0 4px;padding-left:8px;border-left:2px solid var(--accent)}
.preview-tab h3{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:var(--purple);margin:8px 0 3px;padding-left:12px}
.preview-tab ul{padding-left:18px;color:var(--muted)}
.preview-tab li{margin-bottom:3px}
.preview-tab a{color:var(--accent);text-decoration:none}
.preview-tab code{font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;color:var(--orange)}
.preview-tab hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.preview-tab blockquote{border-left:3px solid var(--border);padding-left:12px;color:var(--muted);font-size:12px}

.output-footer{
  padding:9px 14px;border-top:1px solid var(--border);
  background:var(--surface2);display:flex;gap:7px;
}
.out-btn{
  flex:1;border:1px solid var(--border);background:transparent;
  border-radius:8px;font-family:'Outfit',sans-serif;
  font-size:11px;font-weight:600;padding:8px;cursor:pointer;
  color:var(--muted);transition:all .12s;text-align:center;
}
.out-btn:hover{border-color:var(--text);color:var(--text)}
.out-btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.out-btn.primary:hover{opacity:.9}
.out-btn.done{border-color:var(--green);color:var(--green)}

/* ── AI enhance ── */
.ai-bar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;
  box-shadow:var(--shadow-md);margin-top:14px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  grid-column:1/-1;
}
.ai-bar-text{font-size:12px;color:var(--muted);flex:1;min-width:200px}
.ai-bar-text strong{color:var(--purple);font-weight:600}
.btn-ai{
  background:linear-gradient(135deg,#6030c0,#bc8cff);color:#fff;border:none;
  border-radius:8px;font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:700;padding:9px 18px;cursor:pointer;
  transition:opacity .13s;flex-shrink:0;white-space:nowrap;
}
.btn-ai:hover{opacity:.88}
.btn-ai:disabled{opacity:.4;cursor:default}

/* Loading spinner */
.spinning{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>🗺️ Markdown <span>サイトマップ</span> 生成器</h1>
    <p>ページ名とURLを入力するだけ。AIエージェントが読み取りやすい階層構造のMarkdownを自動生成します。</p>
  </div>

  <div class="layout">

    <!-- Input -->
    <div class="card">
      <div class="card-head">
        <span class="card-label">サイト情報 & ページ一覧</span>
        <div class="card-acts">
          <button class="c-btn" onclick="loadSample()">サンプル</button>
          <button class="c-btn" onclick="clearAll()">クリア</button>
        </div>
      </div>

      <div class="input-pane">

        <!-- Site info -->
        <div class="site-info-row">
          <div class="field">
            <label>サイト名</label>
            <input type="text" id="site-name" placeholder="My Website" value="">
          </div>
          <div class="field">
            <label>ベースURL</label>
            <input type="text" id="base-url" placeholder="https://example.com" value="">
          </div>
        </div>

        <!-- Format -->
        <div class="page-list-label">
          出力フォーマット
        </div>
        <div class="format-row" id="format-row">
          <button class="fmt-btn active" id="fmt-agent" onclick="setFmt('agent',this)">🤖 AIエージェント用</button>
          <button class="fmt-btn" id="fmt-simple" onclick="setFmt('simple',this)">📋 シンプル</button>
          <button class="fmt-btn" id="fmt-full" onclick="setFmt('full',this)">📊 フル（詳細）</button>
          <button class="fmt-btn" id="fmt-xml" onclick="setFmt('xml',this)">🔤 XML風</button>
        </div>

        <!-- Options -->
        <div class="options-row">
          <label class="opt-chip on" id="opt-url"   onclick="toggleOpt(this,'url')">   <input type="checkbox" checked>🔗 URL含める</label>
          <label class="opt-chip on" id="opt-desc"  onclick="toggleOpt(this,'desc')">  <input type="checkbox" checked>📝 説明文欄を表示</label>
          <label class="opt-chip on" id="opt-meta"  onclick="toggleOpt(this,'meta')">  <input type="checkbox" checked>📌 メタ情報</label>
          <label class="opt-chip"   id="opt-emoji"  onclick="toggleOpt(this,'emoji')"> <input type="checkbox">✨ 絵文字アイコン</label>
        </div>

        <!-- Page list -->
        <div class="page-list-label">
          ページ一覧
          <span class="hint">← → でインデント（階層）</span>
        </div>
        <div class="page-rows" id="page-rows"></div>
        <button class="btn-add-row" onclick="addRow()">＋ ページを追加</button>

        <!-- Generate -->
        <button class="btn-gen" onclick="generate()">
          ⚡ Markdownを生成する
        </button>

      </div>
    </div>

    <!-- Output -->
    <div class="card" style="display:flex;flex-direction:column">
      <div class="tab-bar">
        <div class="tab active" id="tab-md" onclick="switchTab('md',this)">Markdown</div>
        <div class="tab" id="tab-preview" onclick="switchTab('preview',this)">プレビュー</div>
      </div>

      <div class="output-pane">
        <div class="md-output" id="md-output">
          <div class="md-empty-icon">🗺</div>
          左のフォームを入力して「生成」を押してください
        </div>
        <div class="preview-tab" id="preview-pane"></div>
      </div>

      <div class="output-footer">
        <button class="out-btn primary" onclick="generate()">🔄 再生成</button>
        <button class="out-btn" id="btn-copy" onclick="copyOutput()">📋 コピー</button>
        <button class="out-btn" onclick="downloadMd()">⬇ .md保存</button>
      </div>
    </div>

  </div>

  <!-- AI Enhance bar -->
  <div class="ai-bar">
    <div class="ai-bar-text">
      <strong>🤖 AI強化</strong>：Claude APIを使って、各ページの説明文・目的・主要コンテンツを自動補完します。
    </div>
    <button class="btn-ai" id="btn-ai-enhance" onclick="aiEnhance()">
      ✨ AIで説明文を自動生成
    </button>
  </div>

</div>

<script>
// ── State ──
let pages   = [];
let nextId  = 0;
let format  = 'agent';
let opts    = {url:true, desc:true, meta:true, emoji:false};
let currentTab = 'md';
let outputText = '';

// ── Init with sample ──
function init(){
  addRow(0,'ホーム','/',          'サイトのトップページ');
  addRow(0,'ブログ','/blog',      '記事・お知らせ');
  addRow(1,'記事一覧','/blog/list','全記事の一覧');
  addRow(1,'カテゴリ','/blog/cat', 'カテゴリ別表示');
  addRow(0,'サービス','/services', 'サービス紹介');
  addRow(1,'料金プラン','/pricing', 'プラン比較表');
  addRow(0,'会社概要','/about',    '企業情報・ミッション');
  addRow(0,'お問い合わせ','/contact','問い合わせフォーム');
}

// ── Opts ──
function toggleOpt(el, key){
  opts[key] = !opts[key];
  el.classList.toggle('on', opts[key]);
  el.querySelector('input').checked = opts[key];
  // Show/hide desc inputs
  if(key==='desc') toggleDescInputs();
}
function toggleDescInputs(){
  document.querySelectorAll('.page-desc-input').forEach(el=>{
    el.classList.toggle('show', opts.desc);
  });
}

function setFmt(f, btn){
  format = f;
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Row management ──
function addRow(indent=0, name='', url='', desc=''){
  const id = nextId++;
  pages.push({id, indent, name, url, desc});
  renderRows();
  // Focus last name input
  requestAnimationFrame(()=>{
    const input = document.getElementById(`name-${id}`);
    if(input) input.focus();
  });
}

function removeRow(id){
  pages = pages.filter(p=>p.id!==id);
  renderRows();
}

function indentRow(id, delta){
  const p = pages.find(p=>p.id===id);
  if(!p) return;
  p.indent = Math.max(0, Math.min(4, p.indent + delta));
  document.getElementById(`indent-${id}`).textContent = '·'.repeat(p.indent) || '—';
}

function updateRow(id, field, value){
  const p = pages.find(p=>p.id===id);
  if(p) p[field] = value;
}

function renderRows(){
  const container = document.getElementById('page-rows');
  container.innerHTML = pages.map(p=>`
    <div class="page-row" id="row-${p.id}">
      <button class="indent-btn" onclick="indentRow(${p.id},-1)" title="インデントを減らす">←</button>
      <span class="indent-display" id="indent-${p.id}">${'·'.repeat(p.indent)||'—'}</span>
      <button class="indent-btn" onclick="indentRow(${p.id},1)" title="インデントを増やす">→</button>
      <input type="text" class="page-name-input"
        id="name-${p.id}"
        value="${escAttr(p.name)}"
        placeholder="ページ名"
        oninput="updateRow(${p.id},'name',this.value)">
      ${opts.url?`<input type="text" class="page-url-input"
        id="url-${p.id}"
        value="${escAttr(p.url)}"
        placeholder="/path"
        oninput="updateRow(${p.id},'url',this.value)">`:''}
      <input type="text" class="page-desc-input ${opts.desc?'show':''}"
        id="desc-${p.id}"
        value="${escAttr(p.desc)}"
        placeholder="説明文（任意）"
        oninput="updateRow(${p.id},'desc',this.value)">
      <button class="del-row-btn" onclick="removeRow(${p.id})" title="削除">✕</button>
    </div>`).join('');
}

// ── Generate ──
function generate(){
  // Sync latest values from DOM
  pages.forEach(p=>{
    const nameEl = document.getElementById(`name-${p.id}`);
    const urlEl  = document.getElementById(`url-${p.id}`);
    const descEl = document.getElementById(`desc-${p.id}`);
    if(nameEl) p.name = nameEl.value;
    if(urlEl)  p.url  = urlEl.value;
    if(descEl) p.desc = descEl.value;
  });

  const siteName = document.getElementById('site-name').value.trim() || 'サイト名';
  const baseUrl  = document.getElementById('base-url').value.trim() || '';
  const now      = new Date().toLocaleDateString('ja-JP');

  let md = '';

  if(format === 'agent'){
    md = buildAgentFormat(siteName, baseUrl, now);
  } else if(format === 'simple'){
    md = buildSimpleFormat(siteName, baseUrl);
  } else if(format === 'full'){
    md = buildFullFormat(siteName, baseUrl, now);
  } else if(format === 'xml'){
    md = buildXmlFormat(siteName, baseUrl, now);
  }

  outputText = md;
  renderOutput(md);
}

// ── Format builders ──
function buildAgentFormat(siteName, baseUrl, now){
  const lines = [];
  if(opts.meta){
    lines.push(`# ${siteName} — サイトマップ`);
    lines.push('');
    lines.push('```yaml');
    lines.push(`generated: "${now}"`);
    if(baseUrl) lines.push(`base_url: "${baseUrl}"`);
    lines.push(`total_pages: ${pages.length}`);
    lines.push(`format: "ai-agent-sitemap/1.0"`);
    lines.push('```');
    lines.push('');
    lines.push('---');
    lines.push('');
  }

  lines.push('## 📂 ページ構造');
  lines.push('');

  pages.forEach(p=>{
    const indent = '  '.repeat(p.indent);
    const emoji  = opts.emoji ? getPageEmoji(p.name, p.url) + ' ' : '';
    const name   = p.name || '（未入力）';
    const url    = p.url  ? `\`${baseUrl}${p.url}\`` : '';
    const desc   = p.desc ? ` — ${p.desc}` : '';
    lines.push(`${indent}- ${emoji}**${name}**${url?' '+url:''}${desc}`);
  });

  lines.push('');
  lines.push('---');
  lines.push('');
  lines.push('## 🤖 AIエージェント向けコンテキスト');
  lines.push('');
  lines.push(`このサイトマップは **${siteName}** のページ構造を示しています。`);
  lines.push('各ページのURLと目的を参照して、適切なナビゲーションや情報収集を行ってください。');
  lines.push('');

  const tops   = pages.filter(p=>p.indent===0);
  const subs   = pages.filter(p=>p.indent > 0);
  lines.push(`- トップレベルページ数: ${tops.length}`);
  lines.push(`- サブページ数: ${subs.length}`);
  lines.push(`- 最大階層深度: ${Math.max(...pages.map(p=>p.indent),0)+1}`);

  return lines.join('\n');
}

function buildSimpleFormat(siteName, baseUrl){
  const lines = [];
  lines.push(`# ${siteName}`);
  lines.push('');
  pages.forEach(p=>{
    const indent = '  '.repeat(p.indent);
    const url    = opts.url && p.url ? ` (${baseUrl}${p.url})` : '';
    lines.push(`${indent}- ${p.name||'（未入力）'}${url}`);
  });
  return lines.join('\n');
}

function buildFullFormat(siteName, baseUrl, now){
  const lines = [];
  lines.push(`# ${siteName} サイトマップ`);
  lines.push('');
  lines.push(`> 生成日: ${now}${baseUrl?' | Base URL: '+baseUrl:''}`);
  lines.push('');

  // Group by top-level
  let currentTop = null;
  pages.forEach(p=>{
    if(p.indent===0){
      currentTop = p;
      lines.push(`## ${p.name}`);
      if(opts.url && p.url) lines.push('');
      if(opts.url && p.url) lines.push(`**URL:** \`${baseUrl}${p.url}\``);
      if(p.desc)            lines.push(`**概要:** ${p.desc}`);
      lines.push('');
    } else {
      const indent = '  '.repeat(p.indent-1);
      const url    = opts.url && p.url ? ` — \`${baseUrl}${p.url}\`` : '';
      const desc   = p.desc ? `  \n  > ${p.desc}` : '';
      lines.push(`${indent}- **${p.name}**${url}${desc}`);
    }
  });
  return lines.join('\n');
}

function buildXmlFormat(siteName, baseUrl, now){
  const lines = [];
  lines.push('```xml');
  lines.push(`<!-- ${siteName} Sitemap — Generated ${now} -->`);
  lines.push('<sitemap>');
  if(baseUrl) lines.push(`  <base_url>${baseUrl}</base_url>`);
  lines.push(`  <site_name>${escHtml(siteName)}</site_name>`);
  lines.push('  <pages>');
  pages.forEach(p=>{
    const ind   = '    ' + '  '.repeat(p.indent);
    const depth = p.indent + 1;
    lines.push(`${ind}<page depth="${depth}">`);
    lines.push(`${ind}  <name>${escHtml(p.name||'')}</name>`);
    if(opts.url && p.url) lines.push(`${ind}  <url>${escHtml(baseUrl+p.url)}</url>`);
    if(p.desc)            lines.push(`${ind}  <description>${escHtml(p.desc)}</description>`);
    lines.push(`${ind}</page>`);
  });
  lines.push('  </pages>');
  lines.push('</sitemap>');
  lines.push('```');
  return lines.join('\n');
}

// ── Render output ──
function renderOutput(md){
  const el = document.getElementById('md-output');
  el.className = 'md-output';
  // Syntax highlight
  el.innerHTML = syntaxHighlight(md);

  // Preview
  document.getElementById('preview-pane').innerHTML = renderMarkdownPreview(md);

  if(currentTab==='md'){
    el.style.display='block';
    document.getElementById('preview-pane').style.display='none';
  }
}

function syntaxHighlight(md){
  return escHtml(md)
    .replace(/^(#{1}) (.+)/gm,  '<span class="md-h1">$&</span>')
    .replace(/^(#{2}) (.+)/gm,  '<span class="md-h2">$&</span>')
    .replace(/^(#{3}) (.+)/gm,  '<span class="md-h3">$&</span>')
    .replace(/^(\s*-) /gm,      '<span class="md-bullet">$1</span> ')
    .replace(/`([^`]+)`/g,       '<span class="md-url">`$1`</span>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong style="color:var(--text)">$1</strong>')
    .replace(/^(>.*)/gm,         '<span class="md-comment">$1</span>');
}

function renderMarkdownPreview(md){
  let html = escHtml(md);
  html = html.replace(/^### (.+)/gm,  '<h3>$1</h3>');
  html = html.replace(/^## (.+)/gm,   '<h2>$1</h2>');
  html = html.replace(/^# (.+)/gm,    '<h1>$1</h1>');
  html = html.replace(/^---$/gm,      '<hr>');
  html = html.replace(/^&gt; (.+)/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/^(\s*)- (.+)/gm,(_,sp,t)=>{
    const depth = sp.length/2;
    return `<div style="margin-left:${depth*14}px;padding:2px 0">· ${t}</div>`;
  });
  html = html.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  html = html.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  html = html.replace(/```[\s\S]*?```/g, m=>`<pre style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:11px;overflow-x:auto;margin:8px 0">${m.replace(/```(\w*)\n?/g,'').replace(/```/g,'')}</pre>`);
  html = html.replace(/\n/g,'<br>');
  return html;
}

// ── Tab switch ──
function switchTab(tab, btn){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const md = document.getElementById('md-output');
  const pv = document.getElementById('preview-pane');
  if(tab==='md'){
    md.style.display='block'; pv.classList.remove('show');
  } else {
    md.style.display='none'; pv.classList.add('show');
  }
}

// ── AI Enhance ──
async function aiEnhance(){
  // Sync
  pages.forEach(p=>{
    const n=document.getElementById(`name-${p.id}`),u=document.getElementById(`url-${p.id}`);
    if(n) p.name=n.value; if(u) p.url=u.value;
  });

  const nonEmpty = pages.filter(p=>p.name.trim());
  if(!nonEmpty.length){ alert('ページを追加してください'); return; }

  const btn = document.getElementById('btn-ai-enhance');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinning">⏳</span> AIが説明文を生成中...';

  try{
    const siteName = document.getElementById('site-name').value || 'Webサイト';
    const list = nonEmpty.map(p=>`- ${p.name}${p.url?' ('+p.url+')':''}`).join('\n');

    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        system:'あなたはWebサイトの設計を支援するコンサルタントです。各ページの目的・主要コンテンツ・ユーザーの意図を簡潔に日本語で説明します。',
        messages:[{role:'user', content:`「${siteName}」というWebサイトの以下のページに、AIエージェントが理解しやすい説明文（各15〜30文字）を付けてください。\n\n${list}\n\nJSON形式で返答:\n{"descriptions":{"ページ名":"説明文",...}}`}]
      })
    });

    if(!res.ok) throw new Error(`API Error: ${res.status}`);
    const d = await res.json();
    const t = d.content?.[0]?.text||'';
    const parsed = JSON.parse(t.replace(/```json|```/g,'').trim());
    const descs  = parsed.descriptions || {};

    // Apply to pages
    pages.forEach(p=>{
      if(descs[p.name]){
        p.desc = descs[p.name];
        const descEl = document.getElementById(`desc-${p.id}`);
        if(descEl) descEl.value = p.desc;
      }
    });

    // Show desc option
    if(!opts.desc){
      opts.desc = true;
      const chip = document.getElementById('opt-desc');
      chip.classList.add('on');
      chip.querySelector('input').checked = true;
      toggleDescInputs();
    }

    generate();
  }catch(e){
    alert('AI強化に失敗しました：' + e.message);
  }finally{
    btn.disabled = false;
    btn.innerHTML = '✨ AIで説明文を自動生成';
  }
}

// ── Page emoji ──
function getPageEmoji(name, url){
  const n = (name+url).toLowerCase();
  if(/home|top|トップ|ホーム/.test(n))     return '🏠';
  if(/blog|記事|news|ニュース/.test(n))    return '📝';
  if(/about|会社|概要/.test(n))            return '🏢';
  if(/contact|問い合わせ|連絡/.test(n))    return '📮';
  if(/service|サービス/.test(n))           return '⚡';
  if(/price|料金|plan|プラン/.test(n))     return '💰';
  if(/product|商品|製品/.test(n))          return '📦';
  if(/faq|よくある/.test(n))               return '❓';
  if(/login|ログイン|sign/.test(n))        return '🔑';
  if(/search|検索/.test(n))                return '🔍';
  if(/cart|カート/.test(n))                return '🛒';
  if(/user|ユーザー|profile/.test(n))      return '👤';
  if(/category|カテゴリ/.test(n))          return '📂';
  if(/tag|タグ/.test(n))                   return '🏷';
  if(/map|マップ|location/.test(n))        return '📍';
  return '📄';
}

// ── Copy / Download ──
function copyOutput(){
  if(!outputText) return;
  navigator.clipboard.writeText(outputText).then(()=>{
    const btn = document.getElementById('btn-copy');
    const orig = btn.textContent;
    btn.textContent='✓ コピー済み'; btn.classList.add('done');
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('done'); },1500);
  });
}

function downloadMd(){
  if(!outputText){ alert('先に生成してください'); return; }
  const name = (document.getElementById('site-name').value||'sitemap').replace(/\s+/g,'-').toLowerCase();
  const blob = new Blob([outputText],{type:'text/markdown;charset=utf-8'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `${name}-sitemap.md`;
  a.click(); URL.revokeObjectURL(a.href);
}

function loadSample(){
  document.getElementById('site-name').value = 'All AI Toolbox';
  document.getElementById('base-url').value  = 'https://all-ai-toolbox.com';
  pages = []; nextId = 0;
  init();
  generate();
}

function clearAll(){
  pages = []; nextId = 0;
  renderRows();
  document.getElementById('site-name').value = '';
  document.getElementById('base-url').value  = '';
  const el = document.getElementById('md-output');
  el.className = 'md-output empty';
  el.innerHTML = '<div class="md-empty-icon">🗺</div>左のフォームを入力して「生成」を押してください';
  outputText = '';
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escAttr(s){ return String(s).replace(/"/g,'&quot;') }

// ── Start ──
init();
generate();
</script>
