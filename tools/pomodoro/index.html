<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポモドーロ・タイマー</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#fafafa;
  --white:#ffffff;
  --border:#e4e8ef;
  --text:#111318;
  --muted:#6b7280;
  --light:#b0b7c3;
  --work:#e85d3a;
  --work-l:rgba(232,93,58,.08);
  --rest:#059669;
  --rest-l:rgba(5,150,105,.08);
  --shadow:0 1px 3px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.09);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  background:var(--bg);color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 16px 80px;
  transition:background .5s;
}

body.resting{--bg:#f0fdf8}

.wrap{width:100%;max-width:400px}

/* ── Header ── */
.header{text-align:center;margin-bottom:28px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;
  letter-spacing:-.01em;color:var(--text);margin-bottom:3px;
}
.header p{font-size:12px;color:var(--muted)}

/* ── Notif bar ── */
.notif-bar{
  background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.18);
  border-radius:10px;padding:9px 14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-bottom:12px;
}
.notif-bar button{
  background:#d97706;color:#fff;border:none;border-radius:6px;
  font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;flex-shrink:0;
}

/* ── Main card ── */
.card{
  background:var(--white);border:1px solid var(--border);
  border-radius:24px;padding:36px 28px 28px;
  box-shadow:var(--shadow-lg);text-align:center;
  margin-bottom:12px;position:relative;overflow:hidden;
  transition:border-color .4s;
}

.card.working{border-color:rgba(232,93,58,.3)}
.card.resting{border-color:rgba(5,150,105,.3)}

/* top accent line */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--work);transition:background .4s;
}
.card.resting::before{background:var(--rest)}

/* ── Phase label ── */
.phase-label{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:5px 14px;border-radius:100px;
  margin-bottom:20px;transition:all .3s;
}
.phase-label.work{color:var(--work);background:var(--work-l);border:1px solid rgba(232,93,58,.15)}
.phase-label.rest{color:var(--rest);background:var(--rest-l);border:1px solid rgba(5,150,105,.15)}
.phase-label.idle{color:var(--muted);background:transparent;border:1px solid var(--border)}

/* ── Ring timer ── */
.ring-wrap{
  position:relative;width:200px;height:200px;margin:0 auto 20px;
}
.ring-svg{width:200px;height:200px;transform:rotate(-90deg);display:block}
.ring-bg{fill:none;stroke:var(--border);stroke-width:8}
.ring-fill{
  fill:none;stroke-width:8;stroke-linecap:round;
  stroke-dasharray:534;stroke-dashoffset:534;
  transition:stroke-dashoffset .9s ease,stroke .4s;
}

.ring-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ring-time{
  font-family:'Outfit',sans-serif;font-size:52px;font-weight:800;
  letter-spacing:-.04em;color:var(--text);line-height:1;
  transition:color .3s;font-variant-numeric:tabular-nums;
}
.ring-time.work{color:var(--work)}
.ring-time.rest{color:var(--rest)}
.ring-session{font-size:12px;color:var(--light);margin-top:4px;letter-spacing:.04em}

/* ── State msg ── */
.state-msg{font-size:14px;font-weight:500;color:var(--muted);margin-bottom:20px;min-height:22px}

/* ── Buttons ── */
.btn-main{
  width:100%;border:none;border-radius:14px;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;
  padding:15px;cursor:pointer;letter-spacing:.02em;
  transition:opacity .15s,transform .1s,background .3s,box-shadow .3s;
}
.btn-main.work-btn{
  background:var(--work);color:#fff;
  box-shadow:0 4px 16px rgba(232,93,58,.3);
}
.btn-main.work-btn:hover{opacity:.9;box-shadow:0 6px 22px rgba(232,93,58,.4)}
.btn-main.rest-btn{
  background:var(--rest);color:#fff;
  box-shadow:0 4px 16px rgba(5,150,105,.28);
}
.btn-main.rest-btn:hover{opacity:.9}
.btn-main.pause-btn{
  background:#374151;color:#fff;
  box-shadow:0 4px 16px rgba(0,0,0,.14);
}
.btn-main:active{transform:scale(.98)}

.btn-row{display:flex;gap:8px;margin-top:8px}

.btn-skip,.btn-reset{
  flex:1;background:transparent;color:var(--muted);
  border:1.5px solid var(--border);border-radius:12px;
  font-family:'Noto Sans JP',sans-serif;font-size:12px;
  padding:10px;cursor:pointer;
  transition:color .15s,border-color .15s;
}
.btn-skip:hover{color:var(--text);border-color:var(--light)}
.btn-reset:hover{color:var(--text);border-color:var(--light)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;padding:13px 8px;text-align:center;box-shadow:var(--shadow);
}
.stat-num{
  font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;
  letter-spacing:-.02em;line-height:1;margin-bottom:3px;
  color:var(--work);
}
.stat-num.green{color:var(--rest)}
.stat-label{font-size:10px;color:var(--light);letter-spacing:.04em}

/* ── Pomodoro dots ── */
.dots-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:16px;box-shadow:var(--shadow);
  text-align:center;
}
.dots-label{
  font-size:10px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;color:var(--light);margin-bottom:10px;
}
.dots{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.dot{
  width:14px;height:14px;border-radius:50%;
  background:var(--border);transition:background .3s,transform .2s;
}
.dot.done{background:var(--work)}
.dot.current{background:var(--work);transform:scale(1.3);box-shadow:0 0 0 3px var(--work-l)}

/* ── Custom time modal ── */
.settings-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
  box-shadow:var(--shadow);margin-bottom:12px;
}
.settings-header{
  font-size:10px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;color:var(--light);margin-bottom:10px;
}
.time-presets{display:flex;gap:6px;flex-wrap:wrap}
.time-preset{
  padding:5px 12px;border-radius:100px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;
}
.time-preset.active{background:var(--text);border-color:var(--text);color:#fff}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>🍅 ポモドーロ・タイマー</h1>
    <p>25分集中 → 5分休憩のサイクルで生産性を上げましょう</p>
  </div>

  <div class="notif-bar" id="notif-bar" style="display:none">
    <span>🔔 通知を許可すると別タブでも休憩を知らせます</span>
    <button onclick="requestNotif()">許可する</button>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <div class="settings-header">タイマー設定</div>
    <div class="time-presets" id="presets">
      <button class="time-preset" onclick="setPreset(this,15,3)">15 / 3分</button>
      <button class="time-preset active" onclick="setPreset(this,25,5)">25 / 5分 <small>標準</small></button>
      <button class="time-preset" onclick="setPreset(this,50,10)">50 / 10分</button>
    </div>
  </div>

  <!-- Main card -->
  <div class="card" id="main-card">

    <div class="phase-label idle" id="phase-label">⏳ 準備</div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="gWork" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e85d3a"/>
            <stop offset="100%" stop-color="#f97316"/>
          </linearGradient>
          <linearGradient id="gRest" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#059669"/>
            <stop offset="100%" stop-color="#34d399"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="100" cy="100" r="85"/>
        <circle class="ring-fill" id="ring" cx="100" cy="100" r="85" stroke="url(#gWork)"/>
      </svg>
      <div class="ring-center">
        <div class="ring-time" id="ring-time">25:00</div>
        <div class="ring-session" id="ring-session">セッション 1</div>
      </div>
    </div>

    <div class="state-msg" id="state-msg">集中モードを開始してください</div>

    <button class="btn-main work-btn" id="btn-main" onclick="handleMain()">▶ 集中開始</button>
    <div class="btn-row" id="btn-row" style="display:none">
      <button class="btn-skip"  onclick="skip()">⏭ スキップ</button>
      <button class="btn-reset" onclick="reset()">↺ リセット</button>
    </div>

  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-num" id="st-done">0</div><div class="stat-label">完了セッション</div></div>
    <div class="stat"><div class="stat-num green" id="st-rests">0</div><div class="stat-label">休憩回数</div></div>
    <div class="stat"><div class="stat-num" id="st-mins">0</div><div class="stat-label">集中(分)</div></div>
  </div>

  <!-- Dots -->
  <div class="dots-card">
    <div class="dots-label">本日の進捗（4セットで長休憩）</div>
    <div class="dots" id="dots"></div>
  </div>

</div>

<script>
const KEY = 'pomo-stats';
let workMins = 25, restMins = 5;
let WORK_SEC, REST_SEC;

let phase     = 'idle';   // idle | work | pause | rest
let remaining = 0;
let timer     = null;
let session   = 1;

let doneSessions = parseInt(localStorage.getItem('pomo-done')  || '0');
let doneRests    = parseInt(localStorage.getItem('pomo-rests') || '0');

const CIRC = 2 * Math.PI * 85; // ≈ 534

// Init
function init(){
  WORK_SEC  = workMins * 60;
  REST_SEC  = restMins * 60;
  remaining = WORK_SEC;
  updateDisplay();
  renderDots();
  updateStats();
  if('Notification' in window && Notification.permission === 'default'){
    document.getElementById('notif-bar').style.display = 'flex';
  }
}

function requestNotif(){
  Notification.requestPermission();
  document.getElementById('notif-bar').style.display = 'none';
}

// ── Preset ──
function setPreset(el, w, r){
  if(phase !== 'idle') return;
  workMins = w; restMins = r;
  document.querySelectorAll('.time-preset').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  WORK_SEC  = w * 60;
  REST_SEC  = r * 60;
  remaining = WORK_SEC;
  updateDisplay();
}

// ── Controls ──
function handleMain(){
  if(phase === 'idle') startWork();
  else if(phase === 'work')  pauseWork();
  else if(phase === 'pause') resumeWork();
  else if(phase === 'rest')  skipRest();
}

function startWork(){
  phase = 'work'; remaining = WORK_SEC;
  setUI('work');
  timer = setInterval(tick, 1000);
}

function pauseWork(){
  phase = 'pause'; clearInterval(timer);
  setUI('pause');
}

function resumeWork(){
  phase = 'work';
  setUI('work');
  timer = setInterval(tick, 1000);
}

function skip(){
  clearInterval(timer);
  if(phase === 'work' || phase === 'pause') triggerRest();
  else if(phase === 'rest') endRest();
}

function reset(){
  clearInterval(timer);
  phase = 'idle'; remaining = WORK_SEC;
  setUI('idle');
  updateDisplay();
  document.body.className = '';
}

// ── Tick ──
function tick(){
  if(remaining <= 0){
    clearInterval(timer);
    if(phase === 'work')     triggerRest();
    else if(phase === 'rest') endRest();
    return;
  }
  remaining--;
  updateDisplay();
}

// ── Work → Rest ──
function triggerRest(){
  doneSessions++;
  localStorage.setItem('pomo-done', doneSessions);
  phase = 'rest'; remaining = REST_SEC;
  playChime('work');
  notify('🎉 お疲れ様！', `${workMins}分集中完了。${restMins}分休憩してください。`);
  setUI('rest');
  document.body.className = 'resting';
  timer = setInterval(tick, 1000);
  updateStats();
  renderDots();
}

// ── Rest → Work ──
function endRest(){
  doneRests++;
  localStorage.setItem('pomo-rests', doneRests);
  session++;
  phase = 'idle'; remaining = WORK_SEC;
  playChime('rest');
  notify('⏰ 休憩終了！', '次のセッションを始めましょう。');
  setUI('idle');
  document.body.className = '';
  updateStats();
  renderDots();
  // auto start next
  setTimeout(()=>{ if(phase === 'idle') startWork(); }, 800);
}

// ── UI ──
function setUI(p){
  const card   = document.getElementById('main-card');
  const label  = document.getElementById('phase-label');
  const btnM   = document.getElementById('btn-main');
  const btnRow = document.getElementById('btn-row');
  const msg    = document.getElementById('state-msg');

  card.className = 'card ' + (p==='rest' ? 'resting' : p==='work'||p==='pause' ? 'working' : '');

  const cfg = {
    idle:  {lbl:'⏳ 準備',    lcls:'idle', btn:'▶ 集中開始',    bcls:'work-btn', msg:'集中モードを開始してください',    row:false},
    work:  {lbl:'🍅 集中中',  lcls:'work', btn:'⏸ 一時停止',   bcls:'work-btn', msg:`${workMins}分間、集中しましょう！`,row:true },
    pause: {lbl:'⏸ 一時停止',lcls:'idle', btn:'▶ 再開する',    bcls:'pause-btn',msg:'一時停止中…再開するときはボタンを', row:true },
    rest:  {lbl:'☕ 休憩中',  lcls:'rest', btn:'⏭ 休憩をスキップ',bcls:'rest-btn',msg:'目を休めて、少し動きましょう 🚶', row:true },
  };
  const c = cfg[p] || cfg.idle;
  label.textContent = c.lbl;
  label.className   = 'phase-label ' + c.lcls;
  btnM.textContent  = c.btn;
  btnM.className    = 'btn-main ' + c.bcls;
  msg.textContent   = c.msg;
  btnRow.style.display = c.row ? 'flex' : 'none';

  // Ring color
  const ring = document.getElementById('ring');
  ring.setAttribute('stroke', p==='rest' ? 'url(#gRest)' : 'url(#gWork)');
  document.getElementById('ring-time').className = 'ring-time ' + (p==='rest'?'rest':p==='work'?'work':'');
}

function updateDisplay(){
  document.getElementById('ring-time').textContent = fmt(remaining);
  document.getElementById('ring-session').textContent = `セッション ${session}`;

  const total = phase === 'rest' ? REST_SEC : WORK_SEC;
  const pct   = 1 - remaining / total;
  const offset = CIRC * (1 - pct);
  document.getElementById('ring').style.strokeDashoffset = Math.max(0, offset);
}

function updateStats(){
  document.getElementById('st-done').textContent  = doneSessions;
  document.getElementById('st-rests').textContent = doneRests;
  document.getElementById('st-mins').textContent  = doneSessions * workMins;
}

function renderDots(){
  const total = 8;
  const cycle = doneSessions % 4 || (doneSessions > 0 ? 4 : 0);
  let html = '';
  for(let i=0;i<total;i++){
    const n = i+1;
    const isDone    = i < doneSessions % 8;
    const isCurrent = phase === 'work' && n === (doneSessions % 8) + 1;
    html += `<div class="dot ${isDone?'done':''} ${isCurrent?'current':''}"></div>`;
  }
  document.getElementById('dots').innerHTML = html;
}

// ── Tone ──
function playChime(type){
  try{
    const ctx  = new (window.AudioContext||window.webkitAudioContext)();
    const freqs = type === 'work'
      ? [[523,.2,0],[659,.2,160],[784,.35,320]]
      : [[784,.2,0],[659,.2,160],[523,.35,320]];
    freqs.forEach(([f,d,delay])=>{
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = f;
      const t = ctx.currentTime + delay/1000;
      gain.gain.setValueAtTime(.3,t);
      gain.gain.exponentialRampToValueAtTime(.001, t+d+.05);
      osc.start(t); osc.stop(t+d+.1);
    });
  }catch(e){}
}

// ── Notification ──
function notify(title, body){
  if('Notification' in window && Notification.permission === 'granted'){
    new Notification(title, {body, icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍅</text></svg>'});
  }
}

function fmt(s){
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

init();
</script>
</body>
</html>
