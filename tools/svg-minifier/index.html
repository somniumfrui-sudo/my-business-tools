<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Minifier</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1117;
  --surface:#161b22;
  --surface2:#1c2333;
  --border:#30363d;
  --text:#e6edf3;
  --muted:#8b949e;
  --light:#484f58;
  --green:#3fb950;
  --green-l:rgba(63,185,80,.10);
  --blue:#58a6ff;
  --blue-l:rgba(88,166,255,.08);
  --yellow:#e3b341;
  --red:#ff7b72;
  --red-l:rgba(255,123,114,.07);
  --shadow-md:0 4px 20px rgba(0,0,0,.4);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:36px 16px 100px;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(63,185,80,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(63,185,80,.015) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:1;max-width:1000px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:22px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-.02em;margin-bottom:4px;color:var(--text);
}
.header h1 span{color:var(--green)}
.header p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── Options card ── */
.options-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;
  box-shadow:var(--shadow-md);margin-bottom:12px;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
}
.opt-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.opt-divider{width:1px;height:18px;background:var(--border);margin:0 2px}

.opt-chip{
  display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;
  color:var(--muted);padding:5px 12px;border-radius:7px;
  border:1.5px solid var(--border);background:rgba(255,255,255,.03);
  cursor:pointer;transition:all .13s;user-select:none;
}
.opt-chip:hover{border-color:var(--green);color:var(--text)}
.opt-chip.on{background:var(--green-l);border-color:rgba(63,185,80,.35);color:var(--green)}
.opt-chip input{display:none}

/* ── Editor layout ── */
.editor{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:620px){.editor{grid-template-columns:1fr}}

.pane{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md);
  display:flex;flex-direction:column;
}
.pane-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-bottom:1px solid var(--border);
  background:var(--surface2);flex-shrink:0;
}
.pane-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.pane-acts{display:flex;gap:4px}
.p-btn{
  font-size:11px;font-weight:500;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:2px 8px;border-radius:5px;
  transition:color .12s,background .12s;
}
.p-btn:hover{color:var(--text);background:rgba(255,255,255,.07)}
.p-btn.done{color:var(--green)}

textarea{
  flex:1;width:100%;background:var(--surface);border:none;outline:none;
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:400;
  color:var(--text);padding:14px;resize:none;line-height:1.7;
  min-height:280px;tab-size:2;
}
textarea::placeholder{color:var(--light);font-family:'Noto Sans JP',sans-serif;font-size:12px;line-height:1.7}
textarea[readonly]{background:rgba(0,0,0,.15);cursor:default}

.pane-foot{
  padding:6px 14px 8px;border-top:1px solid var(--border);
  background:var(--surface2);font-size:10px;color:var(--muted);
  display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;
  font-family:'JetBrains Mono',monospace;font-weight:500;
}
.pane-foot .val{color:var(--text);font-weight:600}
.pane-foot .good{color:var(--green)}
.pane-foot .warn{color:var(--yellow)}

/* ── Action bar ── */
.action-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.btn-run{
  flex:2;min-width:160px;background:linear-gradient(135deg,#238636,#2ea043);
  color:#fff;border:none;border-radius:10px;
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;
  padding:13px;cursor:pointer;
  box-shadow:0 0 20px rgba(63,185,80,.18);
  transition:opacity .13s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-run:hover{opacity:.9;box-shadow:0 0 28px rgba(63,185,80,.3)}
.btn-run:active{transform:scale(.99)}
.btn-sub{
  flex:1;min-width:80px;background:transparent;color:var(--muted);
  border:1.5px solid var(--border);border-radius:10px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  padding:13px 10px;cursor:pointer;transition:all .13s;text-align:center;
}
.btn-sub:hover{border-color:var(--text);color:var(--text)}
.btn-sub.done{border-color:var(--green);color:var(--green)}

/* ── Stats card ── */
.stats-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;
  box-shadow:var(--shadow-md);margin-bottom:12px;
  display:none;animation:fadeIn .3s ease;
}
.stats-card.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-box{
  flex:1;min-width:120px;text-align:center;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 10px;
}
.stat-val{
  font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;
  color:var(--text);line-height:1;margin-bottom:3px;
}
.stat-val.green{color:var(--green)}
.stat-val.blue {color:var(--blue)}
.stat-val.yellow{color:var(--yellow)}
.stat-label{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.04em}

/* Savings bar */
.savings-bar-wrap{margin-bottom:12px}
.savings-bar-label{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--muted);margin-bottom:5px;
  font-family:'Outfit',sans-serif;font-weight:600;
}
.savings-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.savings-fill{
  height:100%;background:linear-gradient(90deg,#238636,var(--green));
  border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);
}

/* Optimizations list */
.opts-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.opt-list{display:flex;flex-direction:column;gap:5px}
.opt-item{
  display:flex;align-items:flex-start;gap:8px;font-size:12px;
  padding:7px 10px;border-radius:7px;
}
.opt-item.applied{background:var(--green-l);color:var(--green)}
.opt-item.skipped{background:rgba(255,255,255,.02);color:var(--muted)}
.opt-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.opt-detail{font-size:10px;color:var(--light);margin-top:2px}

/* ── Preview panes ── */
.preview-row{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;
}
@media(max-width:620px){.preview-row{grid-template-columns:1fr}}

.preview-pane{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md);
}
.preview-head{
  padding:8px 14px;border-bottom:1px solid var(--border);
  background:var(--surface2);font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
}
.preview-body{
  padding:16px;display:flex;align-items:center;justify-content:center;
  min-height:140px;background:repeating-conic-gradient(rgba(255,255,255,.03) 0% 25%, transparent 0% 50%) 0/20px 20px;
}
.preview-body svg,.preview-body img{max-width:100%;max-height:120px;display:block}
.preview-body.empty{color:var(--light);font-size:12px}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>⌨️SVG <span>Minifier</span></h1>
    <p>SVGコードを貼るだけ。不要なメタデータ・空白・コメントを除去し、ファイルサイズを最小化します。</p>
  </div>

  <!-- Options -->
  <div class="options-card">
    <span class="opt-label">最適化オプション</span>

    <label class="opt-chip on" id="opt-meta"     onclick="toggleOpt(this,'meta')">    <input type="checkbox" checked>🗑 メタデータ除去</label>
    <label class="opt-chip on" id="opt-comments" onclick="toggleOpt(this,'comments')"><input type="checkbox" checked>💬 コメント削除</label>
    <label class="opt-chip on" id="opt-whitespace"onclick="toggleOpt(this,'whitespace')"><input type="checkbox" checked>⬜ 空白の圧縮</label>
    <label class="opt-chip on" id="opt-attrs"    onclick="toggleOpt(this,'attrs')">   <input type="checkbox" checked>📝 冗長な属性削除</label>
    <label class="opt-chip on" id="opt-default"  onclick="toggleOpt(this,'default')"> <input type="checkbox" checked>🔢 デフォルト値削除</label>
    <label class="opt-chip on" id="opt-ids"      onclick="toggleOpt(this,'ids')">     <input type="checkbox" checked>🔑 不要ID削除</label>
    <label class="opt-chip on" id="opt-style"    onclick="toggleOpt(this,'style')">   <input type="checkbox" checked>🎨 スタイル最適化</label>
    <label class="opt-chip"    id="opt-path"     onclick="toggleOpt(this,'path')">    <input type="checkbox">📐 パス数値丸め</label>
    <label class="opt-chip"    id="opt-defs"     onclick="toggleOpt(this,'defs')">    <input type="checkbox">♻ 未使用defs除去</label>

    <div class="opt-divider"></div>
    <span class="opt-label">丸め精度</span>
    <select id="precision-sel" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;padding:5px 10px;outline:none;cursor:pointer">
      <option value="1">1桁</option>
      <option value="2" selected>2桁（推奨）</option>
      <option value="3">3桁</option>
      <option value="4">4桁（高精度）</option>
    </select>
  </div>

  <!-- Editor -->
  <div class="editor">
    <div class="pane">
      <div class="pane-head">
        <span class="pane-label">入力 SVG</span>
        <div class="pane-acts">
          <button class="p-btn" onclick="pasteInput()">貼り付け</button>
          <button class="p-btn" onclick="loadSample()">サンプル</button>
          <button class="p-btn" onclick="clearAll()">クリア</button>
        </div>
      </div>
      <textarea id="svg-input"
        placeholder="&lt;svg xmlns=&quot;http://www.w3.org/2000/svg&quot; ...&gt;&#10;  &lt;!-- コメント --&gt;&#10;  &lt;path d=&quot;M 10 20 L 30 40&quot;/&gt;&#10;&lt;/svg&gt;&#10;&#10;SVGコードをここに貼り付けてください。"
        oninput="liveStats()"></textarea>
      <div class="pane-foot">
        <span>サイズ：<span class="val" id="in-size">0 B</span></span>
        <span>行数：<span class="val" id="in-lines">0</span></span>
        <span>要素数：<span class="val" id="in-elems">0</span></span>
      </div>
    </div>

    <div class="pane">
      <div class="pane-head">
        <span class="pane-label">最適化済み SVG</span>
        <div class="pane-acts">
          <button class="p-btn" id="btn-copy-out" onclick="copyOutput()">コピー</button>
          <button class="p-btn" onclick="downloadSvg()">⬇ DL</button>
        </div>
      </div>
      <textarea id="svg-output" readonly placeholder="最適化結果がここに表示されます"></textarea>
      <div class="pane-foot">
        <span>サイズ：<span class="val" id="out-size">0 B</span></span>
        <span>行数：<span class="val" id="out-lines">0</span></span>
        <span>削減：<span class="val good" id="out-saving">—</span></span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn-run" onclick="minify()">⚡ SVGを最適化する</button>
    <button class="btn-sub" id="btn-copy-all" onclick="copyOutput()">📋 コピー</button>
    <button class="btn-sub" onclick="downloadSvg()">⬇ SVG保存</button>
    <button class="btn-sub" onclick="clearAll()">クリア</button>
  </div>

  <!-- Stats -->
  <div class="stats-card" id="stats-card">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="st-before">0B</div><div class="stat-label">最適化前</div></div>
      <div class="stat-box"><div class="stat-val green" id="st-after">0B</div><div class="stat-label">最適化後</div></div>
      <div class="stat-box"><div class="stat-val blue" id="st-saved">0B</div><div class="stat-label">削減量</div></div>
      <div class="stat-box"><div class="stat-val yellow" id="st-pct">0%</div><div class="stat-label">圧縮率</div></div>
    </div>

    <div class="savings-bar-wrap">
      <div class="savings-bar-label">
        <span>圧縮率</span>
        <span id="sb-label">0%削減</span>
      </div>
      <div class="savings-track">
        <div class="savings-fill" id="savings-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="opts-title">適用した最適化</div>
    <div class="opt-list" id="opt-list"></div>
  </div>

  <!-- Preview -->
  <div class="preview-row" id="preview-row" style="display:none">
    <div class="preview-pane">
      <div class="preview-head">Before（最適化前）</div>
      <div class="preview-body" id="preview-before"><span style="color:var(--light);font-size:12px">SVGを入力してください</span></div>
    </div>
    <div class="preview-pane">
      <div class="preview-head">After（最適化後）</div>
      <div class="preview-body" id="preview-after"><span style="color:var(--light);font-size:12px">最適化後のプレビュー</span></div>
    </div>
  </div>

</div>

<script>
// ── Options state ──
const opts = {meta:true,comments:true,whitespace:true,attrs:true,default:true,ids:true,style:true,path:false,defs:false};

function toggleOpt(el, key){
  opts[key] = !opts[key];
  el.classList.toggle('on', opts[key]);
  el.querySelector('input').checked = opts[key];
}

// ── Live stats ──
function liveStats(){
  const v    = document.getElementById('svg-input').value;
  const bytes= new TextEncoder().encode(v).length;
  document.getElementById('in-size').textContent  = fmtBytes(bytes);
  document.getElementById('in-lines').textContent = v ? v.split('\n').length : 0;
  const elems = (v.match(/<[a-zA-Z]/g)||[]).length;
  document.getElementById('in-elems').textContent = elems;
}

// ══════════════════════════════════════════════
// ── MINIFIER ENGINE ──
// ══════════════════════════════════════════════
function minify(){
  let svg = document.getElementById('svg-input').value.trim();
  if(!svg){ alert('SVGコードを入力してください'); return; }

  const precision = parseInt(document.getElementById('precision-sel').value);
  const log = []; // applied optimizations

  const origSize = new TextEncoder().encode(svg).length;

  // ── 1. Remove XML declaration ──
  const hadXml = /^<\?xml/.test(svg);
  if(hadXml){ svg = svg.replace(/<\?xml[^?]*\?>/g,''); log.push({icon:'✅',text:'XML宣言を削除',detail:`<?xml ...?> を除去`}); }

  // ── 2. Remove doctype ──
  if(/<!DOCTYPE/i.test(svg)){
    svg = svg.replace(/<!DOCTYPE[^>]*>/gi,'');
    log.push({icon:'✅',text:'DOCTYPE宣言を削除'});
  }

  // ── 3. Remove comments ──
  if(opts.comments){
    const before = svg.length;
    svg = svg.replace(/<!--[\s\S]*?-->/g,'');
    if(svg.length < before) log.push({icon:'✅',text:`コメントを削除`,detail:`<!-- ... --> を全削除`});
    else log.push({icon:'⬜',text:'コメントなし（スキップ）',skipped:true});
  }

  // ── 4. Remove metadata / title / desc ──
  if(opts.meta){
    const tags = ['metadata','title','desc','defs > style:empty'];
    let removed = 0;
    ['<metadata[^>]*>[\\s\\S]*?<\\/metadata>','<title>[\\s\\S]*?<\\/title>','<desc>[\\s\\S]*?<\\/desc>'].forEach(re=>{
      const before = svg.length;
      svg = svg.replace(new RegExp(re,'gi'),'');
      if(svg.length < before) removed++;
    });
    if(removed) log.push({icon:'✅',text:`メタデータを削除（${removed}種）`,detail:`metadata/title/desc タグを除去`});
    else log.push({icon:'⬜',text:'メタデータなし（スキップ）',skipped:true});
  }

  // ── 5. Remove inkscape / sodipodi namespaces & attrs ──
  if(opts.meta){
    const before = svg.length;
    svg = svg.replace(/\s+xmlns:(inkscape|sodipodi|dc|cc|rdf|xlink)="[^"]*"/g,'');
    svg = svg.replace(/\s+(inkscape|sodipodi):[a-zA-Z-]+="[^"]*"/g,'');
    svg = svg.replace(/<sodipodi:[^>]+\/>/g,'');
    svg = svg.replace(/<sodipodi:[^>]+>[\s\S]*?<\/sodipodi:[^>]+>/g,'');
    if(svg.length < before) log.push({icon:'✅',text:'Inkscape/Sodipodi属性を削除',detail:`inkscape: sodipodi: 名前空間を除去`});
  }

  // ── 6. Remove unnecessary namespaces on SVG root ──
  if(opts.attrs){
    svg = svg.replace(/\s+xmlns:xlink="http:\/\/www\.w3\.org\/1999\/xlink"(?!\s+xlink:)/g, (m) => {
      // Only remove if xlink: not used
      if(/xlink:/.test(svg)) return m;
      return '';
    });
  }

  // ── 7. Remove default/redundant attributes ──
  if(opts.default){
    const before = svg.length;
    const defaults = [
      [/\s+xml:space="preserve"/g,''],
      [/\s+version="1\.1"/g,''],
      [/\s+x="0"(?=[\s>\/])/g,''],
      [/\s+y="0"(?=[\s>\/])/g,''],
      [/\s+x="0px"(?=[\s>\/])/g,''],
      [/\s+y="0px"(?=[\s>\/])/g,''],
      [/\s+fill-rule="nonzero"/g,''],
      [/\s+clip-rule="nonzero"/g,''],
      [/\s+display="inline"/g,''],
      [/\s+visibility="visible"/g,''],
      [/\s+overflow="visible"/g,''],
      [/\s+enable-background="[^"]*"/g,''],
    ];
    defaults.forEach(([re,rep])=>{ svg = svg.replace(re,rep); });
    if(svg.length < before) log.push({icon:'✅',text:'デフォルト属性を削除',detail:`x="0" version="1.1" fill-rule="nonzero" 等を除去`});
  }

  // ── 8. Remove empty groups/layers ──
  if(opts.attrs){
    const before = svg.length;
    let changed = true;
    while(changed){
      const prev = svg;
      svg = svg.replace(/<g[^>]*>\s*<\/g>/g,'');
      svg = svg.replace(/<g>\s*(<g[^>]*>[\s\S]*?<\/g>)\s*<\/g>/g,'$1');
      changed = svg !== prev;
    }
    if(svg.length < before) log.push({icon:'✅',text:'空の<g>グループを削除/マージ'});
  }

  // ── 9. Remove unused IDs (simple pass) ──
  if(opts.ids){
    const before = svg.length;
    // Find all ids
    const idMatches = [...svg.matchAll(/\sid="([^"]+)"/g)].map(m=>m[1]);
    idMatches.forEach(id=>{
      const escapedId = id.replace(/[-[\]{}()*+?.,\\^$|#\s]/g,'\\$&');
      const usedPattern = new RegExp(`(url\\(#${escapedId}\\)|href="#${escapedId}"|xlink:href="#${escapedId}")`);
      if(!usedPattern.test(svg)){
        svg = svg.replace(new RegExp(`\\s+id="${escapedId}"`,'g'),'');
      }
    });
    if(svg.length < before) log.push({icon:'✅',text:'未使用IDを削除',detail:`参照されていないid属性を除去`});
    else log.push({icon:'⬜',text:'未使用IDなし、または全て参照あり',skipped:true});
  }

  // ── 10. Optimize styles ──
  if(opts.style){
    const before = svg.length;
    // none → remove fill/stroke
    svg = svg.replace(/\s+fill="none"(?=[\s>\/])/g, ' fill="none"'); // keep
    // Convert rgb() to hex
    svg = svg.replace(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/g,(_,r,g,b)=>{
      return '#'+[r,g,b].map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
    });
    // Shorten hex colors #aabbcc → #abc
    svg = svg.replace(/#([0-9a-fA-F])\1([0-9a-fA-F])\2([0-9a-fA-F])\3(?=[";\s])/g,'#$1$2$3');
    // Remove empty style=""
    svg = svg.replace(/\s+style=""/g,'');
    if(svg.length < before) log.push({icon:'✅',text:'カラー・スタイルを最適化',detail:`rgb()→hex, #aabbcc→#abc に変換`});
  }

  // ── 11. Path precision rounding ──
  if(opts.path){
    const before = svg.length;
    const p = precision;
    svg = svg.replace(/d="([^"]+)"/g,(_,d)=>{
      const rounded = d.replace(/(\d+\.\d{'+p+',})/g, n=>parseFloat(n).toFixed(p).replace(/\.?0+$/,''));
      return `d="${rounded}"`;
    });
    svg = svg.replace(/([\d.]+)\.(0+)(?=[,\s])/g,'$1'); // 10.0 → 10
    if(svg.length < before) log.push({icon:'✅',text:`パス数値を${p}桁に丸め`,detail:`小数点以下${p}桁で四捨五入`});
  }

  // ── 12. Remove unused defs ──
  if(opts.defs){
    // Simple: remove defs blocks with no referenced content
    const before = svg.length;
    svg = svg.replace(/<defs[^>]*>\s*<\/defs>/g,'');
    if(svg.length < before) log.push({icon:'✅',text:'空の<defs>を削除'});
  }

  // ── 13. Whitespace compression ──
  if(opts.whitespace){
    const before = svg.length;
    // Remove leading/trailing whitespace in tags
    svg = svg.replace(/\s*\n\s*/g,' ');
    // Compress multiple spaces (but not inside text nodes roughly)
    svg = svg.replace(/[ \t]{2,}/g,' ');
    // Remove space before />
    svg = svg.replace(/\s+\/>/g,'/>');
    // Remove space after <
    svg = svg.replace(/(<\/?)\s+/g,'$1');
    // Remove space before >
    svg = svg.replace(/\s+>/g,'>');
    svg = svg.trim();
    if(svg.length < before) log.push({icon:'✅',text:'空白・改行を圧縮',detail:`不要な空白・改行・インデントを除去`});
  }

  // ── 14. Attribute quote optimization (double → keep, self-closing space) ──
  svg = svg.replace(/ \/>/g,'/>');

  // ── Output ──
  document.getElementById('svg-output').value = svg;

  const newSize = new TextEncoder().encode(svg).length;
  const saved   = origSize - newSize;
  const pct     = origSize > 0 ? Math.round(saved/origSize*100) : 0;

  // Update footer
  document.getElementById('out-size').textContent  = fmtBytes(newSize);
  document.getElementById('out-lines').textContent = svg.split('\n').length;
  document.getElementById('out-saving').textContent = saved > 0 ? `-${fmtBytes(saved)} (-${pct}%)` : '変化なし';

  // Stats card
  document.getElementById('st-before').textContent = fmtBytes(origSize);
  document.getElementById('st-after').textContent  = fmtBytes(newSize);
  document.getElementById('st-saved').textContent  = fmtBytes(saved);
  document.getElementById('st-pct').textContent    = pct + '%';

  document.getElementById('savings-fill').style.width = Math.min(pct, 100) + '%';
  document.getElementById('sb-label').textContent = `${pct}% 削減（${fmtBytes(saved)} 節約）`;

  document.getElementById('opt-list').innerHTML = log.map(l=>`
    <div class="opt-item ${l.skipped?'skipped':'applied'}">
      <span class="opt-icon">${l.icon}</span>
      <div>
        <div>${l.text}</div>
        ${l.detail?`<div class="opt-detail">${l.detail}</div>`:''}
      </div>
    </div>`).join('');

  document.getElementById('stats-card').classList.add('show');

  // Preview
  showPreviews(document.getElementById('svg-input').value, svg);
}

// ── Previews ──
function showPreviews(before, after){
  const row = document.getElementById('preview-row');
  row.style.display = 'grid';

  const tryRender = (id, code)=>{
    const el = document.getElementById(id);
    try{
      if(/<svg/i.test(code)){
        el.innerHTML = code;
        // Scale SVG to fit
        const s = el.querySelector('svg');
        if(s){ s.style.maxWidth='100%'; s.style.maxHeight='120px'; }
      } else {
        el.innerHTML = '<span style="color:var(--light);font-size:11px">⚠ SVGとして解析できません</span>';
      }
    }catch(e){
      el.innerHTML = '<span style="color:var(--red);font-size:11px">プレビューエラー</span>';
    }
  };

  tryRender('preview-before', before);
  tryRender('preview-after',  after);
}

// ── Helpers ──
function fmtBytes(b){
  if(b >= 1048576) return (b/1048576).toFixed(2)+' MB';
  if(b >= 1024)    return (b/1024).toFixed(1)+' KB';
  return b+' B';
}

async function pasteInput(){
  try{
    const t = await navigator.clipboard.readText();
    document.getElementById('svg-input').value = t;
    liveStats();
  }catch(e){ document.getElementById('svg-input').focus(); }
}

function clearAll(){
  document.getElementById('svg-input').value  = '';
  document.getElementById('svg-output').value = '';
  document.getElementById('stats-card').classList.remove('show');
  document.getElementById('preview-row').style.display = 'none';
  liveStats();
}

function copyOutput(){
  const v = document.getElementById('svg-output').value;
  if(!v) return;
  navigator.clipboard.writeText(v).then(()=>{
    ['btn-copy-out','btn-copy-all'].forEach(id=>{
      const b=document.getElementById(id); if(!b) return;
      const o=b.textContent; b.textContent='✓ コピー済み'; b.classList.add('done');
      setTimeout(()=>{ b.textContent=o; b.classList.remove('done'); },1500);
    });
  });
}

function downloadSvg(){
  const v = document.getElementById('svg-output').value;
  if(!v){ alert('先に最適化してください'); return; }
  const blob = new Blob([v],{type:'image/svg+xml;charset=utf-8'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'optimized.svg';
  a.click(); URL.revokeObjectURL(a.href);
}
