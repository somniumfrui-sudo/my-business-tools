<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>怒りのサンドバッグ・エディタ</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0a08;
  --surface:#161210;
  --border:#2a2218;
  --text:#f0e8d8;
  --muted:#8a7a62;
  --light:#4a3a2a;
  --red:#e03020;
  --orange:#e88020;
  --shadow-lg:0 16px 48px rgba(0,0,0,.6);
}

html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  min-height:100vh;
  position:relative;
}

/* ember particles bg */
#ember-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:0;
}

.wrap{
  position:relative;z-index:1;
  flex:1;display:flex;flex-direction:column;
  max-width:680px;width:100%;margin:0 auto;
  padding:36px 16px 24px;
}

/* ── Header ── */
.header{text-align:center;margin-bottom:28px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:clamp(20px,5vw,28px);font-weight:900;
  letter-spacing:-.02em;line-height:1.2;margin-bottom:6px;
}
.header h1 em{color:var(--red);font-style:normal}
.header p{font-size:12px;color:var(--muted);line-height:1.7}

/* ── Mood selector ── */
.mood-row{
  display:flex;gap:6px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;
}
.mood-btn{
  font-size:12px;font-weight:600;padding:5px 13px;border-radius:100px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .13s;
  font-family:'Outfit',sans-serif;
}
.mood-btn:hover{border-color:var(--red);color:var(--text)}
.mood-btn.active{background:var(--red);border-color:var(--red);color:#fff}

/* ── Editor area ── */
.editor-wrap{
  flex:1;position:relative;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,.04);
  min-height:220px;display:flex;flex-direction:column;
  margin-bottom:14px;
  transition:border-color .3s,box-shadow .3s;
}
.editor-wrap.typing{
  border-color:rgba(224,48,32,.35);
  box-shadow:var(--shadow-lg),0 0 24px rgba(224,48,32,.08),inset 0 1px 0 rgba(255,255,255,.04);
}

/* Char count bar */
.editor-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px 6px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.anger-level{
  display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);font-weight:500;
}
.anger-bar{
  width:120px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;
}
.anger-fill{
  height:100%;background:linear-gradient(90deg,#e88020,#e03020);
  border-radius:2px;width:0%;transition:width .3s ease;
}
.anger-emoji{font-size:14px;transition:filter .3s}

textarea#rage-input{
  flex:1;width:100%;background:transparent;border:none;outline:none;
  font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:500;
  color:var(--text);padding:16px;resize:none;line-height:1.8;
  caret-color:var(--red);
  min-height:160px;
}
textarea#rage-input::placeholder{
  color:var(--muted);font-size:14px;line-height:1.9;
}

/* char count */
.char-count{font-size:11px;color:var(--light);font-family:'Outfit',sans-serif;font-weight:600}
.char-count.hot{color:var(--red)}

/* ── Action bar ── */
.action-bar{
  display:flex;gap:8px;flex-wrap:wrap;
}

.btn-destroy{
  flex:3;min-width:180px;
  background:linear-gradient(135deg,#c02010,#e03020);
  color:#fff;border:none;border-radius:12px;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:900;
  padding:15px;cursor:pointer;letter-spacing:.03em;
  box-shadow:0 4px 20px rgba(224,48,32,.35);
  transition:transform .1s,box-shadow .15s,opacity .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-destroy:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 32px rgba(224,48,32,.5);
}
.btn-destroy:active{transform:scale(.98)}
.btn-destroy:disabled{opacity:.4;cursor:default;transform:none}

.btn-sub{
  flex:1;min-width:80px;background:transparent;color:var(--muted);
  border:1.5px solid var(--border);border-radius:12px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;
  padding:15px 10px;cursor:pointer;transition:all .13s;text-align:center;
}
.btn-sub:hover{border-color:var(--text);color:var(--text)}

/* ── Canvas overlay ── */
#shred-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:100;
  display:none;
}

/* ── Result card ── */
.result-card{
  position:fixed;inset:0;z-index:200;
  display:none;
  align-items:center;justify-content:center;
  background:rgba(13,10,8,.85);backdrop-filter:blur(8px);
  padding:20px;
}
.result-card.show{display:flex;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.result-inner{
  background:var(--surface);border:1px solid rgba(224,48,32,.25);
  border-radius:20px;padding:32px 28px;
  max-width:380px;width:100%;
  text-align:center;
  box-shadow:0 0 60px rgba(224,48,32,.15);
  animation:popUp .4s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes popUp{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}

.result-icon{font-size:52px;display:block;margin-bottom:14px;animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.result-title{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;
  color:var(--text);margin-bottom:6px;
}
.result-desc{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:24px}
.result-stat{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;margin-bottom:20px;
  font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;color:var(--red);
}
.result-stat-label{font-size:11px;color:var(--muted);font-weight:400;font-family:'Noto Sans JP',sans-serif}
.btn-result{
  width:100%;background:var(--red);color:#fff;border:none;
  border-radius:10px;font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:800;padding:14px;cursor:pointer;
  transition:opacity .13s;
}
.btn-result:hover{opacity:.88}

/* ── Calm tips ── */
.tips-bar{
  display:none;margin-top:12px;
  background:rgba(232,128,32,.06);border:1px solid rgba(232,128,32,.15);
  border-radius:10px;padding:11px 16px;
  font-size:12px;color:var(--muted);line-height:1.7;text-align:center;
}
.tips-bar.show{display:block;animation:fadeIn .5s ease}
.tips-bar strong{color:var(--orange)}
</style>
</head>
<body>

<!-- Background embers -->
<canvas id="ember-canvas"></canvas>

<!-- Shred canvas -->
<canvas id="shred-canvas"></canvas>

<!-- Result overlay -->
<div class="result-card" id="result-card">
  <div class="result-inner">
    <span class="result-icon" id="result-icon">🔥</span>
    <div class="result-title" id="result-title">粉砕完了</div>
    <div class="result-desc" id="result-desc">あなたの怒りは完全に消滅しました。</div>
    <div class="result-stat" id="result-stat">
      0 文字<br>
      <span class="result-stat-label">の怒りを爆破しました</span>
    </div>
    <button class="btn-result" onclick="closeResult()">😌 気持ちスッキリ、閉じる</button>
  </div>
</div>

<div class="wrap">

  <div class="header">
    <h1>💢 怒りの<em>サンドバッグ</em><br>エディタ</h1>
    <p>思い切り打ち込んで、「粉砕」ボタンを押してください。<br>入力した内容は一切保存されません。</p>
  </div>

  <!-- Mood -->
  <div class="mood-row">
    <button class="mood-btn active" id="mood-0" onclick="setMood(0,this)">😤 ムカつく</button>
    <button class="mood-btn" id="mood-1" onclick="setMood(1,this)">🤬 超腹立つ</button>
    <button class="mood-btn" id="mood-2" onclick="setMood(2,this)">😡 許せない</button>
    <button class="mood-btn" id="mood-3" onclick="setMood(3,this)">💀 ぶっ壊したい</button>
  </div>

  <!-- Editor -->
  <div class="editor-wrap" id="editor-wrap">
    <div class="editor-head">
      <div class="anger-level">
        <span class="anger-emoji" id="anger-emoji">😐</span>
        <div class="anger-bar"><div class="anger-fill" id="anger-fill"></div></div>
        <span id="anger-label">平静</span>
      </div>
      <span class="char-count" id="char-count">0文字</span>
    </div>
    <textarea id="rage-input"
      placeholder="ここに怒りをぶつけてください。&#10;&#10;「あいつ本当に最悪だ」&#10;「なんで自分だけこんな目に…」&#10;「もう限界！！！」&#10;&#10;何でも書いて大丈夫。誰も見ていません。"
      oninput="onType()"></textarea>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn-destroy" id="btn-destroy" onclick="destroy()">
      💥 粉砕する！
    </button>
    <button class="btn-sub" onclick="stampText()">🔨 叩く</button>
    <button class="btn-sub" onclick="clearAll()">🗑 消す</button>
  </div>

  <!-- Calm tip -->
  <div class="tips-bar" id="tips-bar"></div>

</div>

<script>
// ── Mood config ──
const MOODS = [
  {label:'😤 ムカつく',  result_icon:'😤', result_title:'解放完了',      result_desc:'胸のモヤモヤを吐き出せました。少し楽になったはずです。',  bg:'rgba(224,48,32,.03)'},
  {label:'🤬 超腹立つ', result_icon:'🤬', result_title:'爆発完了！',    result_desc:'怒りのエネルギーを全部ぶつけられました。今は落ち着きましょう。',bg:'rgba(224,48,32,.05)'},
  {label:'😡 許せない', result_icon:'🌪', result_title:'全消去完了！',  result_desc:'あなたの感情は確かに受け止められ、そして消滅しました。',    bg:'rgba(224,48,32,.07)'},
  {label:'💀 ぶっ壊したい',result_icon:'💀',result_title:'完全粉砕！！！',result_desc:'宇宙の果てまで吹き飛ばしました。お疲れ様でした。',           bg:'rgba(224,48,32,.1)'},
];

const CALM_TIPS = [
  '💡 <strong>深呼吸</strong>を3回してみましょう。吸う4秒、止める4秒、吐く8秒。',
  '💡 今感じていることは<strong>正常な感情</strong>です。怒りは悪いことではありません。',
  '💡 少し<strong>冷たい水</strong>を飲むと、気持ちが落ち着くことがあります。',
  '💡 <strong>散歩や軽い運動</strong>で、体にたまった緊張を解放できます。',
  '💡 この出来事を<strong>1年後の自分</strong>が振り返ったら、どう見えるでしょう？',
  '💡 今日も<strong>よく頑張りました</strong>。あなたは十分すぎるほど頑張っています。',
];

let currentMood = 0;
let destroyCount = 0;

function setMood(i, btn){
  currentMood = i;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Typing anger meter ──
const ANGER_STAGES = [
  {min:0,   max:30,  emoji:'😐', label:'平静',   fill:5},
  {min:30,  max:80,  emoji:'😤', label:'ムカつく', fill:25},
  {min:80,  max:150, emoji:'😠', label:'イライラ', fill:45},
  {min:150, max:250, emoji:'🤬', label:'激怒',   fill:68},
  {min:250, max:400, emoji:'😡', label:'憤慨',   fill:82},
  {min:400, max:9999,emoji:'💀', label:'限界突破',fill:100},
];

function onType(){
  const len  = document.getElementById('rage-input').value.length;
  const wrap = document.getElementById('editor-wrap');
  const cc   = document.getElementById('char-count');

  cc.textContent = len + '文字';
  cc.classList.toggle('hot', len > 200);
  wrap.classList.toggle('typing', len > 0);

  const stage = ANGER_STAGES.find(s=>len>=s.min&&len<s.max) || ANGER_STAGES[ANGER_STAGES.length-1];
  document.getElementById('anger-emoji').textContent   = stage.emoji;
  document.getElementById('anger-label').textContent   = stage.label;
  document.getElementById('anger-fill').style.width    = stage.fill + '%';
}

// ── Stamp effect (hammer) ──
function stampText(){
  const ta = document.getElementById('rage-input');
  if(!ta.value.trim()) return;
  const stamps = ['！！！','💢','ムカつく！','ありえない！','最悪！！'];
  const s = stamps[Math.floor(Math.random()*stamps.length)];
  ta.value += '\n' + s;
  onType();
  playHammer();
  ta.style.transform='scale(1.005)';
  setTimeout(()=>ta.style.transform='',100);
}

// ── Clear ──
function clearAll(){
  document.getElementById('rage-input').value='';
  onType();
  document.getElementById('tips-bar').classList.remove('show');
}

// ── DESTROY ──
function destroy(){
  const text = document.getElementById('rage-input').value.trim();
  if(!text){
    const ta = document.getElementById('rage-input');
    ta.placeholder='何でもいいから書いてください…！';
    ta.focus();
    return;
  }

  document.getElementById('btn-destroy').disabled = true;
  playShredder();
  startShredAnimation(text, ()=>{
    showResult(text.length);
    document.getElementById('btn-destroy').disabled = false;
  });

  destroyCount++;
}

// ═══════════════════════════════════════════
// ── Shred particle animation ──
// ═══════════════════════════════════════════
function startShredAnimation(text, onDone){
  const canvas = document.getElementById('shred-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';

  // Create particles from text characters
  const chars  = text.split('');
  const cx     = canvas.width  / 2;
  const cy     = canvas.height / 2;
  const particles = [];

  // Also create confetti-like shreds
  const SHRED_COLORS = [
    '#e03020','#e88020','#f0c040','#ff6040','#cc2010',
    '#ff4020','#ffa030','#ffcc40'
  ];

  // Text particles
  const count = Math.min(chars.length, 80);
  for(let i=0;i<count;i++){
    const angle = (Math.random()*Math.PI*2);
    const speed = 4 + Math.random()*12;
    particles.push({
      type:'char',
      ch: chars[Math.floor(Math.random()*chars.length)],
      x: cx + (Math.random()-0.5)*300,
      y: cy + (Math.random()-0.5)*200,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 4 - Math.random()*6,
      rot: Math.random()*Math.PI*2,
      vrot: (Math.random()-0.5)*0.3,
      size: 10 + Math.random()*20,
      alpha: 1,
      color: SHRED_COLORS[Math.floor(Math.random()*SHRED_COLORS.length)],
      gravity: 0.4 + Math.random()*0.3,
    });
  }

  // Shred strips
  for(let i=0;i<60;i++){
    const angle = (Math.random()*Math.PI*2);
    const speed = 3 + Math.random()*14;
    particles.push({
      type:'strip',
      x: cx + (Math.random()-0.5)*200,
      y: cy + (Math.random()-0.5)*160,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 5 - Math.random()*8,
      w: 2 + Math.random()*4,
      h: 8 + Math.random()*24,
      rot: Math.random()*Math.PI*2,
      vrot: (Math.random()-0.5)*0.25,
      alpha: 1,
      color: SHRED_COLORS[Math.floor(Math.random()*SHRED_COLORS.length)],
      gravity: 0.35 + Math.random()*0.3,
    });
  }

  // Sparks
  for(let i=0;i<80;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 6 + Math.random()*18;
    particles.push({
      type:'spark',
      x: cx + (Math.random()-0.5)*100,
      y: cy + (Math.random()-0.5)*80,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 6,
      size: 1.5 + Math.random()*3,
      alpha: 1,
      color: Math.random()>.5?'#ffcc40':'#ff6020',
      gravity: 0.5 + Math.random()*0.4,
      trail: [],
    });
  }

  let frame = 0;
  const maxFrames = 90;

  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Flash
    if(frame < 8){
      const fl = (8-frame)/8;
      ctx.fillStyle = `rgba(224,48,32,${fl*0.22})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    let alive = false;
    particles.forEach(p=>{
      if(p.alpha <= 0.01) return;
      alive = true;

      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.98;
      p.rot += p.vrot;
      p.alpha -= frame < 30 ? 0.008 : 0.022;
      if(p.alpha < 0) p.alpha = 0;

      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);

      if(p.type==='char'){
        ctx.font = `${p.size}px 'Noto Sans JP',sans-serif`;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 8;
        ctx.fillText(p.ch, 0, 0);
      } else if(p.type==='strip'){
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 4;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      } else if(p.type==='spark'){
        ctx.beginPath();
        ctx.arc(0,0,p.size,0,Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 12;
        ctx.fill();
      }
      ctx.restore();
    });

    frame++;
    if(frame < maxFrames && alive){
      requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      canvas.style.display='none';

      // Clear textarea
      document.getElementById('rage-input').value = '';
      onType();
      onDone();
    }
  }

  // Screen shake
  shakeScreen();
  requestAnimationFrame(tick);
}

function shakeScreen(){
  const wrap = document.querySelector('.wrap');
  let t = 0;
  const shakes = [[-5,3],[6,-4],[-4,6],[5,-3],[-3,4],[2,-2],[0,0]];
  function sh(){
    if(t>=shakes.length){ wrap.style.transform=''; return; }
    wrap.style.transform=`translate(${shakes[t][0]}px,${shakes[t][1]}px)`;
    t++;
    setTimeout(sh,40);
  }
  sh();
}

// ═══════════════════════════════════════════
// ── Result ──
// ═══════════════════════════════════════════
function showResult(charCount){
  const mood = MOODS[currentMood];
  document.getElementById('result-icon').textContent  = mood.result_icon;
  document.getElementById('result-title').textContent = mood.result_title;
  document.getElementById('result-desc').textContent  = mood.result_desc;
  document.getElementById('result-stat').innerHTML    =
    `${charCount.toLocaleString()} 文字<br><span class="result-stat-label">の怒りを爆破しました（${destroyCount}回目）</span>`;
  document.getElementById('result-card').classList.add('show');
}

function closeResult(){
  document.getElementById('result-card').classList.remove('show');
  // Show calm tip
  const tip = CALM_TIPS[Math.floor(Math.random()*CALM_TIPS.length)];
  const tb  = document.getElementById('tips-bar');
  tb.innerHTML = tip;
  tb.classList.add('show');
}

// ═══════════════════════════════════════════
// ── Background ember canvas ──
// ═══════════════════════════════════════════
(function(){
  const canvas = document.getElementById('ember-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const embers = Array.from({length:24},()=>newEmber());
  function newEmber(){
    return{
      x: Math.random()*W,
      y: H + Math.random()*40,
      size: .6 + Math.random()*1.8,
      alpha: 0,
      maxAlpha: .08 + Math.random()*.14,
      speed: .3 + Math.random()*.6,
      drift: (Math.random()-.5)*.4,
      flicker: Math.random()*Math.PI*2,
    };
  }

  function animEmbers(){
    ctx.clearRect(0,0,W,H);
    embers.forEach(e=>{
      e.y      -= e.speed;
      e.x      += e.drift;
      e.flicker+= 0.06;
      e.alpha   = e.maxAlpha * (.7+.3*Math.sin(e.flicker));
      if(e.y < -10) Object.assign(e, newEmber(), {y:H+10});

      ctx.save();
      ctx.globalAlpha = e.alpha;
      ctx.beginPath();
      ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
      ctx.fillStyle='#e88020';
      ctx.shadowColor='#ff6020';
      ctx.shadowBlur=8;
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(animEmbers);
  }
  animEmbers();
})();

// ═══════════════════════════════════════════
// ── Sound synthesis (Web Audio API) ──
// ═══════════════════════════════════════════
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playShredder(){
  try{
    const ctx  = getAudio();
    const dur  = 1.2;

    // White noise burst
    const bufLen = ctx.sampleRate * dur;
    const buf    = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data   = buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1) * Math.pow(1-i/bufLen,0.5);

    const src    = ctx.createBufferSource();
    src.buffer   = buf;

    // Band-pass for shredder texture
    const bp1    = ctx.createBiquadFilter();
    bp1.type     = 'bandpass';
    bp1.frequency.value = 800;
    bp1.Q.value  = 0.5;

    const bp2    = ctx.createBiquadFilter();
    bp2.type     = 'highpass';
    bp2.frequency.value = 300;

    const gain   = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(1.2, ctx.currentTime+.02);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+dur);

    src.connect(bp1); bp1.connect(bp2); bp2.connect(gain); gain.connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + dur);

    // Impact thud
    const osc  = ctx.createOscillator();
    osc.type   = 'sine';
    osc.frequency.setValueAtTime(120, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime+.25);

    const og   = ctx.createGain();
    og.gain.setValueAtTime(0.8, ctx.currentTime);
    og.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.25);

    osc.connect(og); og.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+.25);

  }catch(e){}
}

function playHammer(){
  try{
    const ctx   = getAudio();
    const osc   = ctx.createOscillator();
    osc.type    = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime+.12);

    const gain  = ctx.createGain();
    gain.gain.setValueAtTime(.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.12);

    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+.13);
  }catch(e){}
}
