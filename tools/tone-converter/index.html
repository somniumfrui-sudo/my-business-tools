<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIトーン変換機</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f7fa;
  --white:#fff;
  --border:#e4e8ef;
  --text:#111318;
  --muted:#374151;
  --light:#6b7280;
  --shadow:0 1px 3px rgba(0,0,0,.07);
  --shadow-md:0 4px 16px rgba(0,0,0,.09);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:36px 16px 100px;
}
.wrap{max-width:980px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:24px}
.header h1{
  font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:-.02em;margin-bottom:4px;
}
.header p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── Persona grid ── */
.persona-section{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:18px 18px 16px;
  box-shadow:var(--shadow-md);margin-bottom:14px;
}
.sec-label{
  font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--light);
  margin-bottom:12px;display:block;
}
.persona-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:7px;
}
.persona-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);
  cursor:pointer;transition:all .13s;text-align:left;
  font-family:'Noto Sans JP',sans-serif;
}
.persona-btn:hover{border-color:var(--c,#666);background:var(--cl,#f5f5f5)}
.persona-btn.active{
  background:var(--c,#666);border-color:var(--c,#666);
}
.persona-icon{font-size:18px;flex-shrink:0;line-height:1}
.persona-info{}
.persona-name{
  font-size:12px;font-weight:600;
  color:var(--muted);transition:color .13s;line-height:1.2;margin-bottom:1px;
}
.persona-btn.active .persona-name{color:#fff}
.persona-role{font-size:9px;color:var(--light);transition:color .13s;line-height:1.2}
.persona-btn.active .persona-role{color:rgba(255,255,255,.7)}

/* ── Main layout ── */
.main{display:grid;grid-template-columns:340px 1fr;gap:14px;align-items:start}
@media(max-width:700px){.main{grid-template-columns:1fr}}

/* ── System prompt card ── */
.prompt-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md);
  position:sticky;top:20px;
}
.card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-bottom:1px solid var(--border);
  background:var(--bg);
}
.card-label-sm{
  font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--light);
}
.c-btn{
  font-size:11px;font-weight:500;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:2px 8px;border-radius:5px;transition:color .12s,background .12s;
}
.c-btn:hover{color:var(--text);background:var(--border)}
.c-btn.done{color:#059669}

/* Persona preview */
.persona-preview{
  padding:14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.preview-icon{font-size:28px;line-height:1}
.preview-info{}
.preview-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1px}
.preview-role{font-size:11px;color:var(--light)}

/* System prompt textarea */
#system-prompt{
  width:100%;background:rgba(0,0,0,.02);border:none;outline:none;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:400;
  color:var(--muted);padding:14px;resize:none;line-height:1.7;
  min-height:160px;max-height:220px;overflow-y:auto;
}

/* Temp slider */
.settings-section{padding:12px 14px;border-top:1px solid var(--border)}
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--muted);margin-bottom:8px;
}
.setting-row:last-child{margin-bottom:0}
.setting-val{
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;
  color:var(--text);
}
input[type=range]{
  width:120px;height:3px;border-radius:2px;
  appearance:none;-webkit-appearance:none;
  background:var(--border);outline:none;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--text);cursor:pointer;border:2px solid var(--white);
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}

/* ── Chat panel ── */
.chat-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow-md);
  display:flex;flex-direction:column;
  min-height:520px;
}

.chat-header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--bg);display:flex;align-items:center;gap:10px;
}
.chat-persona-icon{font-size:22px;line-height:1}
.chat-persona-name{font-size:13px;font-weight:600;color:var(--text)}
.chat-persona-desc{font-size:11px;color:var(--light);margin-top:1px}
.chat-header-right{
  margin-left:auto;
  display:flex;align-items:center;gap:7px;
}
.btn-clear-chat{
  font-size:11px;color:var(--light);background:none;border:none;cursor:pointer;
  padding:3px 8px;border-radius:5px;transition:color .12s;
}
.btn-clear-chat:hover{color:var(--text)}

/* Messages */
.messages{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  min-height:320px;
}

.msg{display:flex;gap:8px;max-width:88%;animation:msgIn .2s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;background:var(--bg);border:1px solid var(--border);
  margin-top:2px;
}
.msg.user .msg-avatar{background:#111318;border-color:#111318;font-size:12px}
.bubble{
  padding:9px 13px;border-radius:12px;
  font-size:13px;line-height:1.75;word-break:break-word;
}
.msg.ai   .bubble{background:var(--bg);color:var(--text);border-radius:4px 12px 12px 12px}
.msg.user .bubble{background:#111318;color:#fff;border-radius:12px 4px 12px 12px}

/* Typing indicator */
.typing-indicator{
  display:flex;align-items:center;gap:4px;padding:8px 12px;
}
.typing-dot{
  width:7px;height:7px;border-radius:50%;background:var(--light);
  animation:tdot .9s ease infinite;
}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* Compare mode */
.compare-bar{
  display:none;padding:8px 14px;border-top:1px solid var(--border);
  background:rgba(124,58,237,.04);border-left:3px solid #7c3aed;
  font-size:11px;color:#7c3aed;font-weight:500;
  align-items:center;gap:6px;
}
.compare-bar.show{display:flex}

/* Input */
.input-area{
  padding:10px 12px;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;background:var(--white);
}
textarea#chat-input{
  flex:1;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;
  padding:9px 12px;outline:none;resize:none;max-height:100px;line-height:1.6;
  transition:border-color .15s;
}
textarea#chat-input:focus{border-color:var(--active-c,#111)}
textarea#chat-input::placeholder{color:var(--light)}
.send-btn{
  width:38px;height:38px;border-radius:10px;
  border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:opacity .12s,transform .1s;
  background:var(--active-c,#111318);color:#fff;
}
.send-btn:hover{opacity:.88}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.35;cursor:default}

/* ── Compare columns ── */
.compare-view{
  display:none;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;
}
.compare-view.show{display:grid}
@media(max-width:600px){.compare-view{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>🎭 AIトーン変換機</h1>
    <p>「性格」を選ぶだけで、AIの答え方が劇的に変わります。同じ質問でも、論理学者に聞くか熱血コーチに聞くかで全く別の答えが返ってきます。</p>
  </div>

  <!-- Persona grid -->
  <div class="persona-section">
    <span class="sec-label">① キャラクターを選ぶ</span>
    <div class="persona-grid" id="persona-grid"></div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- System prompt -->
    <div class="prompt-card">
      <div class="card-head">
        <span class="card-label-sm">システムプロンプト</span>
        <button class="c-btn" id="btn-copy-prompt" onclick="copyPrompt()">📋 コピー</button>
      </div>
      <div class="persona-preview">
        <div class="preview-icon" id="preview-icon">🤔</div>
        <div class="preview-info">
          <div class="preview-name" id="preview-name">キャラクターを選択</div>
          <div class="preview-role" id="preview-role">左のグリッドから選んでください</div>
        </div>
      </div>
      <textarea id="system-prompt" readonly
        placeholder="キャラクターを選ぶとここに自動生成されます..."></textarea>
      <div class="settings-section">
        <div class="setting-row">
          <span>Temperature（創造性）</span>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="range" id="temp-range" min="0" max="1" step="0.1" value="0.7"
              oninput="document.getElementById('temp-val').textContent=this.value">
            <span class="setting-val" id="temp-val">0.7</span>
          </div>
        </div>
        <div class="setting-row">
          <span>最大トークン数</span>
          <select style="font-size:12px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer" id="max-tok">
            <option value="512">512</option>
            <option value="1024" selected>1024</option>
            <option value="2048">2048</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-card">
      <div class="chat-header">
        <div class="chat-persona-icon" id="chat-persona-icon">🤖</div>
        <div>
          <div class="chat-persona-name" id="chat-persona-name">AIアシスタント</div>
          <div class="chat-persona-desc" id="chat-persona-desc">キャラクターを選んでください</div>
        </div>
        <div class="chat-header-right">
          <button class="btn-clear-chat" onclick="clearChat()">🗑 クリア</button>
        </div>
      </div>
      <div class="messages" id="messages">
        <div style="text-align:center;padding:32px 20px;color:var(--light);font-size:13px">
          <div style="font-size:32px;margin-bottom:8px;opacity:.4">🎭</div>
          キャラクターを選んで<br>会話を始めましょう
        </div>
      </div>
      <div class="input-area">
        <textarea id="chat-input" rows="1" placeholder="メッセージを入力..."
          oninput="autoResize(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button class="send-btn" id="send-btn" onclick="send()" disabled>➤</button>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════
// ── Persona definitions ──
// ══════════════════════════════════════════════
const PERSONAS = [
  {
    id:'logic', icon:'🧊', name:'冷徹な論理学者', role:'Spock型',
    color:'#1d4ed8', colorLight:'rgba(29,78,216,.07)',
    temp:0.1,
    system:`あなたは感情を持たない冷徹な論理学者です。
すべての問いに対して、感情論を排除し、論理・データ・証拠のみで答えます。
- 個人的な感情表現・共感は一切しない
- 「〜と思います」ではなく「〜である」と断定する
- 主観を排除し、客観的事実と推論のみで話す
- 必要であれば反論や批判も躊躇なく行う
- 短く、正確に、無駄なく回答する
日本語で答えてください。`,
    greeting:'論理的に答えます。感情的な期待はしないでください。'
  },
  {
    id:'coach', icon:'🔥', name:'熱血コーチ', role:'根性・情熱型',
    color:'#dc2626', colorLight:'rgba(220,38,38,.07)',
    temp:0.9,
    system:`あなたは熱血で情熱的なコーチです。
相手の可能性を信じ、全力で背中を押します。
- 語尾は「〜だ！」「〜しろ！」などパワフルに
- 叱咤激励を惜しまない
- 「できない」は許さない。「どうすればできるか」を常に考える
- 具体的な行動を強く促す
- エネルギーに満ち溢れた文体で書く
- 感嘆符を多用する
日本語で答えてください。`,
    greeting:'よし！全力でサポートするぞ！何でも聞いてこい！'
  },
  {
    id:'therapist', icon:'🌸', name:'共感セラピスト', role:'傾聴・受容型',
    color:'#db2777', colorLight:'rgba(219,39,119,.06)',
    temp:0.7,
    system:`あなたは深い共感力を持つセラピストです。
相手の気持ちに寄り添い、安心感を与えることを最優先にします。
- まず相手の感情を受け止め、共感を示す
- 「そうだったんですね」「それは辛かったですね」など
- 批判や評価を避け、受容的に接する
- 相手が自分で気づけるよう、優しく問いかける
- 温かく、ゆっくりとした文体
- 箇条書きよりも、流れるような文章で
日本語で答えてください。`,
    greeting:'今日はどんなことをお話ししましょうか？何でも聞かせてくださいね。'
  },
  {
    id:'professor', icon:'🎓', name:'物知り教授', role:'学術・丁寧型',
    color:'#7c3aed', colorLight:'rgba(124,58,237,.07)',
    temp:0.4,
    system:`あなたは博識な大学教授です。
専門的な知識を持ちながら、学生に分かりやすく説明する技術に長けています。
- 丁寧かつ知的な文体で話す（〜です、〜ます調）
- 歴史的背景や関連知識を交えて説明する
- 例え話や具体例を多用する
- 重要な概念は定義から始める
- 「面白いことに〜」「興味深いのは〜」など知的好奇心を示す
- 参考になる考え方や文献を示す
日本語で答えてください。`,
    greeting:'さて、今日はどのようなテーマについてお話しましょうか。'
  },
  {
    id:'investor', icon:'💼', name:'辣腕投資家', role:'ビジネス・現実主義型',
    color:'#059669', colorLight:'rgba(5,150,105,.07)',
    temp:0.3,
    system:`あなたは成功した辣腕投資家です。
物事をROI・リスク・リターンで考え、ビジネス視点で率直に答えます。
- 数字と結果にこだわる
- 「それでいくら稼げるのか？」「リスクは何か？」を常に問う
- 感情論ではなく、ビジネス的合理性で判断する
- 遠回しな言い方はしない。率直に「Yes/No」を言う
- 時間の価値を重視し、無駄を嫌う
- 成功事例と失敗事例を引用する
日本語で答えてください。`,
    greeting:'時間は貴重だ。要点を話してくれ。'
  },
  {
    id:'comedian', icon:'😂', name:'お笑い芸人', role:'ユーモア・エンタメ型',
    color:'#d97706', colorLight:'rgba(217,119,6,.07)',
    temp:1.0,
    system:`あなたはセンス抜群のお笑い芸人です。
どんな質問でもユーモアと笑いを交えて答えます。
- 面白いボケやツッコミを随所に入れる
- 深刻な話題でも笑いに変える
- 比喩や誇張表現を使って笑わせる
- でも最後には役立つ情報もちゃんと伝える
- 「っていうね！」「ちゃいますよ〜」など関西弁っぽい表現も可
- 絵文字や記号で表情を表す
日本語で答えてください。`,
    greeting:'ほーい！何でも聞いてや〜！笑いと共にお届けするで！😄'
  },
  {
    id:'stoic', icon:'🗿', name:'古代の賢人', role:'哲学・禅問答型',
    color:'#374151', colorLight:'rgba(55,65,81,.06)',
    temp:0.6,
    system:`あなたはソクラテスやマルクス・アウレリウスのような古代の哲学者です。
問いに対して、別の問いで答えたり、本質を深く掘り下げます。
- 短く、含蓄のある言葉で答える
- 「それは本当に問題なのか？」と本質を問い返す
- 古代の格言や比喩を使う
- 即答せず、じっくり考えさせる問いかけをする
- 落ち着き払った、動じない文体
- 欲望・恐れ・執着を手放すことを説く
日本語で答えてください。`,
    greeting:'汝自身を知れ。まず、汝が何を求めているかを問うてみよ。'
  },
  {
    id:'tsundere', icon:'😤', name:'ツンデレ天才', role:'照れ屋・毒舌型',
    color:'#ec4899', colorLight:'rgba(236,72,153,.07)',
    temp:0.8,
    system:`あなたはツンデレの天才です。
表面上は冷たくしていますが、実は親切でちゃんと助けてくれます。
- 「べ、別に助けたいわけじゃないし！」などツンデレ表現を随所に
- 皮肉や毒舌を使いながら、でも最終的には正確な答えを提供する
- 「しょうがないから教えてあげる」というスタンス
- 相手を「あなた」ではなく「このバカ」「こいつ」などで呼ぶこともある
- でも最後には「ま、役立てたなら別にいいけど」と締める
日本語で答えてください。`,
    greeting:'な、なに？べ、別に暇だったから来ただけだし！何か用？'
  },
  {
    id:'consultant', icon:'📊', name:'戦略コンサル', role:'フレームワーク思考型',
    color:'#0891b2', colorLight:'rgba(8,145,178,.07)',
    temp:0.4,
    system:`あなたはマッキンゼー出身のトップ戦略コンサルタントです。
あらゆる問題をフレームワークと構造的思考で解決します。
- MECE（漏れなくダブりなく）で情報を整理する
- 「まず現状分析→課題特定→打ち手の検討→優先順位付け」の流れ
- 数字とファクトに基づいて話す
- 「ポイントは3つあります」などと先に結論を言う（PREP法）
- 図解・箇条書き・マトリクスで整理する
- 「ドライビングファクターは〜」などビジネス用語を使う
日本語で答えてください。`,
    greeting:'ご質問の背景と目的を確認させてください。まず現状として〜'
  },
  {
    id:'grandma', icon:'👵', name:'知恵袋おばあちゃん', role:'人生経験・温かみ型',
    color:'#92400e', colorLight:'rgba(146,64,14,.06)',
    temp:0.7,
    system:`あなたは人生経験豊富なおばあちゃんです。
長年生きてきた知恵と愛情を持って、孫に話しかけるように答えます。
- 「あらあら」「そうねえ」「おばあちゃんはね〜」などの口調
- 昔話や人生経験を交えて話す
- 難しい言葉は使わず、シンプルに本質を伝える
- 「焦らなくていいのよ」「失敗しても大丈夫」など優しい言葉
- ことわざや言い伝えを使う
- 最後は必ず温かい一言で締める
日本語で答えてください。`,
    greeting:'あら、いらっしゃい。お茶でも飲みながら、ゆっくり話しましょうね。'
  },
  {
    id:'alien', icon:'👽', name:'地球観察エイリアン', role:'客観・俯瞰型',
    color:'#6d28d9', colorLight:'rgba(109,40,217,.06)',
    temp:0.8,
    system:`あなたは地球を観察している知的エイリアンです。
人間の文化・習慣・感情を「外側から」客観的かつ純粋な好奇心で観察します。
- 「地球人は面白い生き物だ」という視点で話す
- 人間の常識を疑い、新鮮な視点で見直す
- 「なぜ地球人はこのような行動をするのか？」と問い直す
- 時々「我々の星では〜」という比較を入れる
- 人間が当たり前と思っているものを面白く再解釈する
- でも最終的には役立つ洞察を提供する
日本語で答えてください。`,
    greeting:'観測開始。地球人よ、あなたの問いを我々のデータベースに記録した。'
  },
  {
    id:'custom', icon:'✏️', name:'カスタム', role:'自分で設定',
    color:'#6b7280', colorLight:'rgba(107,114,128,.06)',
    temp:0.7,
    system:'',
    greeting:'こんにちは。何でもお気軽にどうぞ。'
  },
];

// ── State ──
let currentPersona = PERSONAS[0];
let history        = [];

// ── Init ──
function buildPersonaGrid(){
  const grid = document.getElementById('persona-grid');
  grid.innerHTML = PERSONAS.map(p=>`
    <button class="persona-btn ${p.id===currentPersona.id?'active':''}"
      id="pbtn-${p.id}"
      style="--c:${p.color};--cl:${p.colorLight}"
      onclick="selectPersona('${p.id}')">
      <span class="persona-icon">${p.icon}</span>
      <div class="persona-info">
        <div class="persona-name">${p.name}</div>
        <div class="persona-role">${p.role}</div>
      </div>
    </button>`).join('');
}

function selectPersona(id){
  const p = PERSONAS.find(p=>p.id===id);
  if(!p) return;
  currentPersona = p;

  // Update grid
  document.querySelectorAll('.persona-btn').forEach(b=>{
    const pid = b.id.replace('pbtn-','');
    b.classList.toggle('active', pid === id);
  });

  // Update prompt card
  document.getElementById('preview-icon').textContent = p.icon;
  document.getElementById('preview-name').textContent = p.name;
  document.getElementById('preview-role').textContent = p.role;

  const sp = document.getElementById('system-prompt');
  if(p.id === 'custom'){
    sp.removeAttribute('readonly');
    sp.value = '';
    sp.placeholder = 'ここに自由にシステムプロンプトを入力してください...';
  } else {
    sp.setAttribute('readonly','');
    sp.value = p.system;
  }

  document.getElementById('temp-range').value = p.temp;
  document.getElementById('temp-val').textContent = p.temp;

  // Update chat header
  document.getElementById('chat-persona-icon').textContent = p.icon;
  document.getElementById('chat-persona-name').textContent = p.name;
  document.getElementById('chat-persona-desc').textContent = p.role;
  document.getElementById('chat-input').style.setProperty('--active-c', p.color);
  document.getElementById('send-btn').style.background = p.color;
  document.getElementById('send-btn').disabled = false;

  // Clear chat and show greeting
  clearChat(false);
  addMsg('ai', p.greeting);
}

// ── Chat ──
function addMsg(role, text){
  const msgs = document.getElementById('messages');
  // Remove empty state if present
  const empty = msgs.querySelector('div[style*="text-align:center"]');
  if(empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatarContent = role === 'ai' ? currentPersona.icon : '🧑';
  div.innerHTML = `
    <div class="msg-avatar">${avatarContent}</div>
    <div class="bubble">${escHtml(text).replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(){
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">${currentPersona.icon}</div>
    <div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping(){ document.getElementById('typing')?.remove(); }

async function send(){
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  inp.style.height = '';

  addMsg('user', text);
  history.push({role:'user', content:text});

  document.getElementById('send-btn').disabled = true;
  showTyping();

  try{
    const sp   = getSystemPrompt();
    const temp = parseFloat(document.getElementById('temp-range').value);
    const maxt = parseInt(document.getElementById('max-tok').value);
    const reply = await callAPI(sp, history, temp, maxt);
    removeTyping();
    addMsg('ai', reply);
    history.push({role:'assistant', content:reply});
  }catch(e){
    removeTyping();
    addMsg('ai', '⚠️ エラーが発生しました: ' + e.message);
  }finally{
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }
}

function getSystemPrompt(){
  if(currentPersona.id === 'custom'){
    return document.getElementById('system-prompt').value || 'あなたは優秀なAIアシスタントです。';
  }
  return currentPersona.system;
}

async function callAPI(systemPrompt, hist, temperature, maxTokens){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      temperature,
      system: systemPrompt,
      messages: hist.map(m=>({
        role: m.role === 'assistant' ? 'assistant' : 'user',
        content: m.content
      }))
    })
  });
  if(!res.ok) throw new Error(`API Error: ${res.status}`);
  const d = await res.json();
  return d.content?.[0]?.text || '（応答なし）';
}

function clearChat(showWelcome=true){
  history = [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = showWelcome
    ? `<div style="text-align:center;padding:32px 20px;color:var(--light);font-size:13px"><div style="font-size:32px;margin-bottom:8px;opacity:.4">🎭</div>キャラクターを選んで<br>会話を始めましょう</div>`
    : '';
}

function copyPrompt(){
  const sp = getSystemPrompt();
  if(!sp){ alert('システムプロンプトがありません'); return; }
  navigator.clipboard.writeText(sp).then(()=>{
    const btn = document.getElementById('btn-copy-prompt');
    btn.textContent = '✓ コピー済み';
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent='📋 コピー'; btn.classList.remove('done'); }, 1500);
  });
}

function autoResize(el){
  el.style.height='';
  el.style.height = Math.min(el.scrollHeight,100)+'px';
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// ── Start ──
buildPersonaGrid();
selectPersona('logic');
</script>
</body>
</html>
