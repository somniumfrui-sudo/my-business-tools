<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘘みたいなホントの言い訳ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#fdfcf8;
  --white:#fff;
  --border:#e8e0d0;
  --text:#1a1208;
  --muted:#6b5c40;
  --light:#a89878;
  --accent:#e85c00;
  --accent-l:rgba(232,92,0,.08);
  --green:#2d7a3a;
  --shadow:0 2px 8px rgba(0,0,0,.08);
  --shadow-md:0 6px 24px rgba(0,0,0,.10);
}

body{
  font-family:'Noto Sans JP',sans-serif;font-weight:400;
  background:var(--bg);color:var(--text);
  min-height:100vh;padding:40px 16px 100px;
}

/* torn paper texture bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(232,92,0,.04) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(255,200,0,.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:680px;margin:0 auto}

/* ── Header ── */
.header{text-align:center;margin-bottom:32px}
.header-emoji{font-size:52px;display:block;margin-bottom:10px;animation:wobble 3s ease-in-out infinite}
@keyframes wobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.header h1{
  font-family:'Outfit',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:900;
  letter-spacing:-.03em;margin-bottom:6px;color:var(--text);
  line-height:1.15;
}
.header h1 em{color:var(--accent);font-style:normal}
.header p{font-size:13px;color:var(--muted);line-height:1.75}

/* ── Settings card ── */
.settings-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:20px;padding:24px 22px;
  box-shadow:var(--shadow-md);margin-bottom:16px;
  position:relative;overflow:hidden;
}
.settings-card::before{
  content:'EXCUSE';position:absolute;right:-10px;top:-8px;
  font-family:'Outfit',sans-serif;font-size:80px;font-weight:900;
  color:rgba(232,92,0,.04);pointer-events:none;letter-spacing:-.05em;
}

.section-label{
  font-size:11px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--light);margin-bottom:12px;display:block;
}

/* Situation grid */
.situation-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:7px;margin-bottom:18px;
}
@media(max-width:420px){.situation-grid{grid-template-columns:repeat(2,1fr)}}

.sit-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 6px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--bg);
  cursor:pointer;transition:all .15s;user-select:none;
}
.sit-btn:hover{border-color:var(--accent);background:var(--accent-l)}
.sit-btn.active{background:var(--accent);border-color:var(--accent)}
.sit-icon{font-size:22px;line-height:1}
.sit-label{
  font-size:11px;font-weight:600;color:var(--muted);text-align:center;line-height:1.3;
}
.sit-btn.active .sit-label{color:#fff}

/* Tone selector */
.tone-row{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;
}
.tone-btn{
  font-size:12px;font-weight:600;padding:6px 14px;border-radius:100px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;transition:all .14s;
}
.tone-btn:hover{border-color:var(--accent);color:var(--accent)}
.tone-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Detail input */
.detail-wrap{margin-bottom:18px}
.detail-input{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);
  font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:400;
  padding:11px 14px;outline:none;resize:none;line-height:1.7;
  transition:border-color .18s,box-shadow .18s;
}
.detail-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-l);
  background:var(--white);
}
.detail-input::placeholder{color:var(--light)}

/* Generate button */
.btn-gen{
  width:100%;
  background:linear-gradient(135deg,#e85c00,#ff8c00);
  color:#fff;border:none;border-radius:14px;
  font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;
  padding:15px;cursor:pointer;letter-spacing:.02em;
  box-shadow:0 4px 20px rgba(232,92,0,.3);
  transition:transform .12s,box-shadow .15s,opacity .12s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(232,92,0,.4)}
.btn-gen:active{transform:scale(.98)}
.btn-gen:disabled{opacity:.5;cursor:default;transform:none}

/* ── Results ── */
.results{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}

.excuse-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:18px 18px 14px;
  box-shadow:var(--shadow);
  animation:cardIn .35s cubic-bezier(.34,1.2,.64,1) both;
  position:relative;overflow:hidden;
}
.excuse-card:nth-child(1){animation-delay:.0s}
.excuse-card:nth-child(2){animation-delay:.07s}
.excuse-card:nth-child(3){animation-delay:.14s}
.excuse-card:nth-child(4){animation-delay:.21s}
.excuse-card:nth-child(5){animation-delay:.28s}

@keyframes cardIn{
  from{opacity:0;transform:translateY(16px) scale(.97)}
  to  {opacity:1;transform:translateY(0) scale(1)}
}

.excuse-num{
  position:absolute;top:14px;right:16px;
  font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;
  color:rgba(232,92,0,.08);line-height:1;
}

.excuse-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 9px;border-radius:100px;margin-bottom:9px;
}

.excuse-text{
  font-size:15px;line-height:1.8;color:var(--text);font-weight:400;
  margin-bottom:12px;
}

.excuse-actions{display:flex;gap:6px;justify-content:flex-end}
.excuse-btn{
  font-size:11px;font-weight:600;padding:5px 13px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);cursor:pointer;transition:all .13s;
}
.excuse-btn:hover{border-color:var(--accent);color:var(--accent)}
.excuse-btn.copied{border-color:var(--green);color:var(--green)}

/* Loading */
.loading-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:36px;text-align:center;
  box-shadow:var(--shadow);
}
.loading-emoji{font-size:40px;animation:spin 1.5s linear infinite;display:block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--muted);line-height:1.7}
.loading-dots::after{content:'';animation:dots 1.2s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

/* ── History ── */
.history-section{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;box-shadow:var(--shadow);
}
.history-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);
}
.history-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--light)}
.btn-clear{font-size:11px;color:var(--light);background:none;border:none;cursor:pointer;transition:color .12s}
.btn-clear:hover{color:var(--accent)}

.history-list{max-height:240px;overflow-y:auto}
.hist-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border);
  font-size:12px;cursor:pointer;transition:background .12s;
}
.hist-item:last-child{border-bottom:none}
.hist-item:hover{background:var(--bg)}
.hist-badge{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;
  flex-shrink:0;margin-top:1px;text-transform:uppercase;letter-spacing:.04em;
  background:var(--accent-l);color:var(--accent);border:1px solid rgba(232,92,0,.2);
}
.hist-text{color:var(--muted);line-height:1.5;flex:1}
.hist-copy{
  font-size:10px;color:var(--light);background:none;border:none;cursor:pointer;
  flex-shrink:0;transition:color .12s;padding:2px;
}
.hist-copy:hover{color:var(--accent)}
.hist-empty{padding:20px;text-align:center;font-size:12px;color:var(--light)}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <span class="header-emoji">😅</span>
    <h1>嘘みたいな<em>ホント</em>の<br>言い訳ジェネレーター</h1>
    <p>シチュエーションを選ぶだけで、AIが「クスッと笑えるのに許される」<br>絶妙なラインの言い訳を5パターン生成します。</p>
  </div>

  <!-- Settings -->
  <div class="settings-card">
    <span class="section-label">① シチュエーション</span>
    <div class="situation-grid" id="situation-grid">
      <button class="sit-btn active" onclick="setSit('仕事（遅刻）',this)"><span class="sit-icon">🏢</span><span class="sit-label">仕事<br>遅刻</span></button>
      <button class="sit-btn" onclick="setSit('仕事（欠席）',this)"><span class="sit-icon">🤒</span><span class="sit-label">仕事<br>欠席</span></button>
      <button class="sit-btn" onclick="setSit('飲み会',this)"><span class="sit-icon">🍺</span><span class="sit-label">飲み会<br>欠席</span></button>
      <button class="sit-btn" onclick="setSit('デート',this)"><span class="sit-icon">💘</span><span class="sit-label">デート<br>遅刻</span></button>
      <button class="sit-btn" onclick="setSit('友人の約束',this)"><span class="sit-icon">👫</span><span class="sit-label">友達との<br>約束</span></button>
      <button class="sit-btn" onclick="setSit('締め切り',this)"><span class="sit-icon">📄</span><span class="sit-label">締め切り<br>遅延</span></button>
      <button class="sit-btn" onclick="setSit('家族の集まり',this)"><span class="sit-icon">👨‍👩‍👧</span><span class="sit-label">家族の<br>集まり</span></button>
      <button class="sit-btn" onclick="setSit('オンライン会議',this)"><span class="sit-icon">💻</span><span class="sit-label">オンライン<br>会議</span></button>
      <button class="sit-btn" onclick="setSit('返信の遅れ',this)"><span class="sit-icon">📱</span><span class="sit-label">返信<br>遅れ</span></button>
    </div>

    <span class="section-label">② 言い訳のトーン</span>
    <div class="tone-row" id="tone-row">
      <button class="tone-btn active" onclick="setTone('ユーモア重視',this)">😂 ユーモア重視</button>
      <button class="tone-btn" onclick="setTone('礼儀正しく',this)">🎩 礼儀正しく</button>
      <button class="tone-btn" onclick="setTone('天然っぽく',this)">🌸 天然っぽく</button>
      <button class="tone-btn" onclick="setTone('大げさに',this)">🎭 大げさに</button>
      <button class="tone-btn" onclick="setTone('超真剣に',this)">😤 超真剣に</button>
    </div>

    <span class="section-label">③ 補足（任意）</span>
    <div class="detail-wrap">
      <textarea class="detail-input" id="detail" rows="2"
        placeholder="例：上司が厳しい、彼女に怒られそう、3回目の遅刻 など"></textarea>
    </div>

    <button class="btn-gen" id="btn-gen" onclick="generate()">
      😅 言い訳を5つ生成する
    </button>
  </div>

  <!-- Results -->
  <div id="results-area"></div>

  <!-- History -->
  <div class="history-section">
    <div class="history-head">
      <span class="history-title">使った言い訳の履歴</span>
      <button class="btn-clear" onclick="clearHistory()">クリア</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="hist-empty">まだ言い訳を生成していません</div>
    </div>
  </div>

</div>

<script>
let situation = '仕事（遅刻）';
let tone      = 'ユーモア重視';
let history   = JSON.parse(localStorage.getItem('excuse-history') || '[]');

function setSit(s, btn){
  situation = s;
  document.querySelectorAll('.sit-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setTone(t, btn){
  tone = t;
  document.querySelectorAll('.tone-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

renderHistory();

// ── Generate ──
async function generate(){
  const detail = document.getElementById('detail').value.trim();
  const btn    = document.getElementById('btn-gen');
  btn.disabled = true;

  // Show loading
  document.getElementById('results-area').innerHTML = `
    <div class="loading-card">
      <span class="loading-emoji">🔄</span>
      <div class="loading-text">最高の言い訳を考案中<span class="loading-dots"></span><br><small style="opacity:.6">嘘みたいな、でも許されそうなやつ</small></div>
    </div>`;

  try{
    const excuses = await callClaude(situation, tone, detail);
    renderExcuses(excuses, situation, tone);
  } catch(e){
    document.getElementById('results-area').innerHTML = `
      <div class="loading-card">
        <span style="font-size:32px;display:block;margin-bottom:10px">⚠️</span>
        <div style="font-size:13px;color:#dc2626">生成に失敗しました：${escHtml(e.message)}</div>
      </div>`;
  } finally {
    btn.disabled = false;
  }
}

// ── Claude API ──
async function callClaude(situation, tone, detail){
  const systemPrompt = `あなたは「言い訳の天才」です。ユーモアセンスがあり、相手に怒られずクスッと笑ってもらえる絶妙な言い訳を考えるのが得意です。`;

  const userPrompt = `シチュエーション：${situation}
トーン：${tone}
補足情報：${detail || 'なし'}

上記の状況に合う「嘘みたいなホントの言い訳」を5つ作ってください。

条件：
- 完全な嘘ではなく、「もしかしてあり得るかも？」と思わせるギリギリのリアリティ
- ${tone}なトーンで
- 日本語の敬語・丁寧語も適切に使う
- 一つひとつ20〜60文字程度
- 笑えるけど相手に許してもらえそうなもの

以下のJSON形式で返答してください（日本語で）：
{
  "excuses": [
    {"text": "言い訳の文章", "risk": "low|medium|high", "vibe": "絵文字1つで表現"},
    ...
  ]
}

JSONのみ返答してください。前置き・解説は不要です。`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }],
    }),
  });

  if (!response.ok) throw new Error(`API Error: ${response.status}`);
  const data = await response.json();
  const text = data.content?.[0]?.text || '';

  // Parse JSON from response
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);
  return parsed.excuses || [];
}

// ── Render excuses ──
const RISK_LABELS = {low:'✅ 安全圏', medium:'⚠ やや危険', high:'🔥 ハイリスク'};
const RISK_COLORS = {
  low:  {bg:'rgba(45,122,58,.08)',  color:'#2d7a3a', border:'rgba(45,122,58,.2)'},
  medium:{bg:'rgba(217,119,6,.08)', color:'#92400e',  border:'rgba(217,119,6,.2)'},
  high: {bg:'rgba(220,38,38,.08)',  color:'#991b1b',  border:'rgba(220,38,38,.2)'},
};

function renderExcuses(excuses, sit, t){
  const area = document.getElementById('results-area');
  area.innerHTML = `<div class="results" id="results-list"></div>`;
  const list = document.getElementById('results-list');

  excuses.forEach((ex, i) => {
    const risk = ex.risk || 'medium';
    const rc   = RISK_COLORS[risk] || RISK_COLORS.medium;
    const card = document.createElement('div');
    card.className = 'excuse-card';
    card.innerHTML = `
      <div class="excuse-num">${i+1}</div>
      <span class="excuse-badge"
        style="background:${rc.bg};color:${rc.color};border:1px solid ${rc.border}">
        ${ex.vibe || ''} ${RISK_LABELS[risk]}
      </span>
      <div class="excuse-text">${escHtml(ex.text)}</div>
      <div class="excuse-actions">
        <button class="excuse-btn" onclick="copyExcuse(this,'${escAttr(ex.text)}','${escAttr(sit)}')">📋 コピー</button>
        <button class="excuse-btn" onclick="shareExcuse('${escAttr(ex.text)}')">🔗 共有</button>
      </div>`;
    list.appendChild(card);
  });

  // Add to history
  excuses.forEach(ex => addHistory(ex.text, sit));
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Copy / Share ──
function copyExcuse(btn, text, sit){
  navigator.clipboard.writeText(text).then(()=>{
    const orig = btn.textContent;
    btn.textContent = '✓ コピー済み';
    btn.classList.add('copied');
    addHistory(text, sit);
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copied'); }, 1500);
  });
}

function shareExcuse(text){
  if(navigator.share){
    navigator.share({text, title:'言い訳ジェネレーター'}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>alert('クリップボードにコピーしました！'));
  }
}

// ── History ──
function addHistory(text, sit){
  history = [{text, sit, time: new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})},
    ...history.filter(h=>h.text!==text)].slice(0, 20);
  localStorage.setItem('excuse-history', JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const el = document.getElementById('history-list');
  if(!history.length){
    el.innerHTML = '<div class="hist-empty">まだ言い訳を生成していません</div>'; return;
  }
  el.innerHTML = history.map(h=>`
    <div class="hist-item">
      <span class="hist-badge">${escHtml(h.sit.slice(0,6))}</span>
      <span class="hist-text">${escHtml(h.text)}</span>
      <button class="hist-copy" onclick="copyText('${escAttr(h.text)}')" title="コピー">📋</button>
    </div>`).join('');
}

function clearHistory(){
  history = [];
  localStorage.setItem('excuse-history','[]');
  renderHistory();
}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{});
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escAttr(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;') }
</script>
</body>
</html>
